<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Statki 2026 — Host v5</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial; }
body { min-height: 100vh; background: radial-gradient(circle at top, #12213a, #070b14 60%); color: #eaf2ff; padding: 20px; overflow-x: hidden; }
body::before, body::after { content: ""; position: fixed; width: 400px; height: 400px; border-radius: 50%; filter: blur(120px); z-index: -1; opacity: 0.25; }
body::before { background: #00ff99; top: -100px; left: -120px; }
body::after { background: #3b82f6; bottom: -120px; right: -120px; }
h1 { font-size: 2.4rem; letter-spacing: 1px; margin-bottom: 6px; color: #00ffb3; }
p { color: #9fb0c8; margin-bottom: 24px; }
button { border: none; cursor: pointer; border-radius: 12px; padding: 14px 20px; font-weight: 600; transition: 0.25s ease; }
#btnStart { width: 100%; margin-top: 18px; padding: 16px; font-size: 18px; background: #1a2233; color: #667; border: 1px solid #2b3b55; }
#btnStart.ready { background: linear-gradient(135deg, #00ff99, #00c2ff); color: #06121f; box-shadow: 0 0 25px rgba(0,255,153,0.25); }
#roomBox { display: none; margin-top: 26px; padding: 20px; border-radius: 18px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); max-width: 600px; }
#joinBox { display: none; margin-top: 26px; padding: 20px; border-radius: 18px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); max-width: 600px; }
#joinBox input { width: 100%; padding: 14px 16px; margin: 8px 0; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.12); color: #eaf2ff; font-size: 18px; border-radius: 12px; outline: none; }
#joinBox input:focus { border-color: #00c2ff; background: rgba(0,194,255,0.05); box-shadow: 0 0 0 3px rgba(0,194,255,0.1); }
#btnConfirmJoin { width: 100%; padding: 14px; margin-top: 12px; background: linear-gradient(135deg, #00ff99, #00c2ff); color: #06121f; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; }
#btnConfirmJoin:hover { transform: translateY(-2px); }
#joinStatus { margin-top: 12px; color: #9fb0c8; font-size: 14px; }
#roomCodeBig { font-size: 2.6rem; letter-spacing: 10px; color: #00ffb3; font-weight: 800; margin: 10px 0 16px; text-shadow: 0 0 20px rgba(0,255,179,0.3); }
#qrBox { text-align: center; margin: 16px 0; padding: 16px; background: rgba(255,255,255,0.02); border-radius: 12px; }
#qrBox p { color: #9fb0c8; font-size: 13px; margin-bottom: 10px; }
#qrCanvas { border-radius: 8px; }

/* QR dla trybu join */
#joinQrBox { text-align: center; margin: 16px 0; padding: 16px; background: rgba(255,255,255,0.02); border-radius: 12px; display: none; }
#joinQrBox p { color: #9fb0c8; font-size: 13px; margin-bottom: 10px; }
#joinQrCanvas { border-radius: 8px; }

#playerList { margin-top: 10px; }
.player-item { padding: 12px 14px; margin: 8px 0; border-radius: 12px; background: rgba(255,255,255,0.05); display: flex; align-items: center; gap: 10px; }
#debug { margin-top: 22px; padding: 14px; border-radius: 12px; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.06); font-size: 12px; max-height: 150px; overflow: auto; }
.ok { color: #00ff99; } .err { color: #ff4d4d; } .inf { color: #ffd166; }

#gameHeader { display: none; padding: 16px; background: rgba(255,255,255,0.04); border-bottom: 1px solid rgba(255,255,255,0.08); margin: -20px -20px 20px -20px; padding-left: 20px; padding-right: 20px; }
#gameHeader.active { display: flex; align-items: center; justify-content: space-between; }
#roomCodeSmall { font-size: 1.8rem; letter-spacing: 6px; color: #00ffb3; font-weight: 800; text-shadow: 0 0 20px rgba(0,255,179,0.3); }

#boardsContainer { display: none; margin-top: 20px; gap: 16px; overflow-y: auto; max-height: calc(100vh - 300px); }
#boardsContainer.active { display: grid; }

/* RESPONSIVE GRID */
@media (min-width: 1400px) { #boardsContainer { grid-template-columns: repeat(4, 1fr); } }
@media (min-width: 1000px) and (max-width: 1399px) { #boardsContainer { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 999px) { #boardsContainer { grid-template-columns: 1fr; } }

.boardCard { padding: 14px; border-radius: 12px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); }
.boardTitle { font-size: 1rem; color: #00ffb3; margin-bottom: 10px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
.colorBadge { width: 18px; height: 18px; border-radius: 50%; }
.boardInfo { font-size: 11px; color: #9fb0c8; margin-bottom: 10px; }

/* BOARD WITH COORDINATES */
.boardWrapper {
  display: flex;
  flex-direction: column;
  gap: 2px;
  align-items: flex-start;
  justify-content: flex-start;
  min-height: 0;
  overflow: hidden;
}

.coordinatesX {
  display: flex;
  gap: 1px;
  justify-content: flex-start;
  margin-left: 16px;
  flex-shrink: 0;
  height: 14px;
}

.coordinateX {
  width: 14px;
  height: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 8px;
  color: #9fb0c8;
  font-weight: 600;
  flex-shrink: 0;
}

.boardWithCoordinates {
  display: flex;
  gap: 2px;
  overflow: auto;
  -webkit-overflow-scrolling: touch;
  min-height: 0;
  flex: 1;
}

.coordinatesY {
  display: flex;
  flex-direction: column;
  gap: 1px;
  font-size: 8px;
  color: #9fb0c8;
  font-weight: 600;
  flex-shrink: 0;
  justify-content: flex-start;
  align-items: center;
  min-height: 0;
}

.coordinateY {
  width: 14px;
  height: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.miniBoard { display: inline-grid; gap: 1px; }
.miniCell { width: 14px; height: 14px; background: #0a1520; border: 0.5px solid #1a2a40; flex-shrink: 0; }
.miniCell.hit { background: rgba(255,77,77,0.6); border: 0.5px solid #ff4d4d; }
.miniCell.miss { background: rgba(100,100,100,0.3); border: 0.5px solid #666; }

.boardStats { margin-top: 8px; font-size: 11px; color: #9fb0c8; display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }

/* MEDIA QUERIES DLA ROTATE */
@media (max-height: 600px) {
  h1 { font-size: 1.6rem; }
  p { font-size: 0.9rem; margin-bottom: 8px; }
  #roomBox { padding: 14px; }
  .boardCard { padding: 10px; }
  .miniCell { width: 12px; height: 12px; }
  .coordinateX, .coordinateY { width: 12px; height: 12px; font-size: 7px; }
  .coordinatesX { height: 12px; }
  .boardTitle { font-size: 0.9rem; margin-bottom: 6px; }
  .boardInfo { font-size: 10px; margin-bottom: 6px; }
  .boardStats { font-size: 10px; }
  #roomCodeBig { font-size: 1.8rem; letter-spacing: 6px; }
  #qrBox { padding: 10px; margin: 8px 0; }
  #qrCanvas { width: 140px !important; height: 140px !important; }
  #joinQrCanvas { width: 140px !important; height: 140px !important; }
}

@media (max-height: 400px) {
  h1 { font-size: 1.2rem; }
  body { padding: 10px; }
  #roomBox { padding: 10px; margin-top: 10px; }
  #qrBox { display: none; }
  #joinQrBox { display: none !important; }
}

@media (orientation: landscape) {
  body { padding: 12px; }
  #boardsContainer { max-height: calc(100vh - 180px); }
  .boardWrapper { min-height: 0; overflow: hidden; }
}
</style>
</head>
<body>

<h1>⚓ Statki 2026</h1>
<p>Panel hosta — v0.5.5</p>

<div id="roomBox">
  <p>Kod pokoju:</p>
  <div id="roomCodeBig">-----</div>

  <div id="qrBox">
    <p>📱 Zeskanuj aby dołączyć:</p>
    <canvas id="qrCanvas"></canvas>
  </div>

  <p style="margin-top:16px">Gracze:</p>
  <div id="playerList"></div>
  <button id="btnStart" disabled>⚠️ Min. 2 graczy</button>
</div>

<div id="joinBox">
  <p>Wpisz kod pokoju:</p>
  <input id="inputJoinCode" type="text" placeholder="Kod pokoju (np. ABC12)" maxlength="5" autocomplete="off" autocapitalize="characters">
  
  <div id="joinQrBox">
    <p>📱 Lub zeskanuj:</p>
    <canvas id="joinQrCanvas"></canvas>
  </div>

  <button id="btnConfirmJoin">🔍 DOŁĄCZ</button>
  <div id="joinStatus"></div>
</div>

<div id="gameHeader">
  <div id="roomCodeSmall">-----</div>
  <div style="color: #9fb0c8; font-size: 14px;">Kod pokoju</div>
</div>

<div id="boardsContainer"></div>
<div id="debug"></div>

<script src="js/game/board.js"></script>
<script src="js/game/rules.js"></script>
<script src="js/game/placement.js"></script>
<script src="js/game/shooter.js"></script>

<script type="module">
const CONFIG = {
  VERSION: '0.5.5',
  SUPABASE_URL: 'https://bmnffrnwnyrqefrzrhtf.supabase.co',
  SUPABASE_ANON_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJtbmZmcm53bnlycWVmcnpyaHRmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI1NTk2MDIsImV4cCI6MjA5ODEzNTYwMn0.irhBO6JX3PNXvJJFFEPcUEayzw-_cEJeBn9OsTcrGIE',
  BOARD_SIZES: { 2: 10, 3: 13, 4: 15 }
};

const { createClient } = await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm');
const supabase = createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);

const QRCode = (await import('https://cdn.jsdelivr.net/npm/qrcode@1.5.3/+esm')).default;

const urlParams = new URLSearchParams(window.location.search);
const modeJoin = urlParams.get('mode') === 'join';

const debug = document.getElementById('debug');
const COORD_LETTERS = ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H', 'I', 'J', 'K', 'L', 'M', 'N', 'O'];
let roomCode = null;
let hostId = null;
let gameStarted = false;

function log(msg, type='inf') {
  const d = document.createElement('div');
  d.className = type;
  d.textContent = msg;
  debug.appendChild(d);
  debug.scrollTop = debug.scrollHeight;
}

function generateHostId() {
  let id = localStorage.getItem('host_id');
  if (!id) { id = 'host_' + Math.random().toString(36).substr(2, 12); localStorage.setItem('host_id', id); }
  return id;
}

function generateCode() {
  const l = 'ABCDEFGHJKLMNPQRSTUVWXYZ';
  const d = '0123456789';
  return l[Math.random()*l.length|0] + l[Math.random()*l.length|0] + l[Math.random()*l.length|0]
       + d[Math.random()*d.length|0] + d[Math.random()*d.length|0];
}

function generateQR(code, canvasId = 'qrCanvas') {
  const url = window.location.origin + '/player-v1.html?code=' + code;
  const canvas = document.getElementById(canvasId);
  QRCode.toCanvas(canvas, url, {
    width: 200,
    margin: 1,
    color: { dark: '#00ffb3', light: '#070b14' }
  }, (err) => {
    if (err) log('⚠️ QR błąd: ' + err.message, 'inf');
    else log('✅ QR wygenerowany' + (canvasId === 'joinQrCanvas' ? ' (join mode)' : ''), 'ok');
  });
}

function renderMiniBoard(board, boardSize) {
  return board.map(cell => {
    let cls = 'miniCell';
    if (cell.hit && cell.state === 'ship') cls += ' hit';
    else if (cell.hit && cell.state === 'water') cls += ' miss';
    return `<div class="${cls}"></div>`;
  }).join('');
}

function renderCoordinates(boardSize) {
  let coordsY = '';
  let coordsX = '';
  
  for (let i = 0; i < boardSize; i++) {
    coordsY += `<div class="coordinateY">${i + 1}</div>`;
    coordsX += `<div class="coordinateX">${COORD_LETTERS[i]}</div>`;
  }
  
  return { coordsY, coordsX };
}

function renderBoards(players) {
  const container = document.getElementById('boardsContainer');
  if (players.length < 1 || !players[0].board) {
    container.classList.remove('active');
    return;
  }
  container.classList.add('active');
  container.innerHTML = '';
  const firstBoard = typeof players[0].board === 'string' ? JSON.parse(players[0].board) : players[0].board;
  const boardSize = Math.sqrt(firstBoard.length);
  
  players.forEach(player => {
    const board = typeof player.board === 'string' ? JSON.parse(player.board) : player.board;
    const sunk = SHOOTER.countSunkShips(board, boardSize);
    const total = RULES.getTotalShipCount(boardSize);
    const { coordsY, coordsX } = renderCoordinates(boardSize);
    
    const card = document.createElement('div');
    card.className = 'boardCard';
    card.innerHTML = `
      <div class="boardTitle">
        <div class="colorBadge" style="background: ${player.color}"></div>
        ${player.name}
      </div>
      <div class="boardInfo">Plansza: ${boardSize}×${boardSize} | Statki: ${(typeof player.ships === 'string' ? JSON.parse(player.ships) : player.ships || []).length}</div>
      <div class="boardWrapper">
        <div class="coordinatesX">${coordsX}</div>
        <div class="boardWithCoordinates">
          <div class="coordinatesY">${coordsY}</div>
          <div class="miniBoard" style="grid-template-columns: repeat(${boardSize}, 14px)">
            ${renderMiniBoard(board, boardSize)}
          </div>
        </div>
      </div>
      <div class="boardStats">
        <div>🎯 Zatopione: ${sunk}/${total}</div>
        <div>⚓ Pozostało: ${total - sunk}</div>
      </div>
    `;
    container.appendChild(card);
  });
}

function updateGameInfo(players) {
  const count = players.length;
  const btn = document.getElementById('btnStart');
  if (count >= 2) {
    btn.disabled = false;
    btn.classList.add('ready');
    btn.textContent = `START (${count} graczy)`;
  } else {
    btn.disabled = true;
    btn.classList.remove('ready');
    btn.textContent = '⚠️ Min. 2 graczy';
  }
}

function render(players) {
  const box = document.getElementById('playerList');
  if (!players?.length) {
    box.innerHTML = '<p class="inf">Czekam na graczy...</p>';
    updateGameInfo([]);
    return;
  }
  box.innerHTML = players.map(p => `
    <div class="player-item">
      <span style="color:${p.color}">●</span>
      <b>${p.name}</b>
    </div>
  `).join('');
  updateGameInfo(players);
  if (gameStarted) renderBoards(players);
}

function startPolling() {
  setInterval(async () => {
    if (!roomCode) return;
    const { data } = await supabase
      .from('players').select('*').eq('room_code', roomCode).order('joined_at', { ascending: true });
    render(data || []);
  }, 1000);
}

hostId = generateHostId();

// INICJALIZACJA
if (modeJoin) {
  document.getElementById('joinBox').style.display = 'block';
  document.getElementById('roomBox').style.display = 'none';
} else {
  // Auto-twórz pokój
  (async () => {
    log('Tworzę pokój...', 'inf');
    const code = generateCode();
    try {
      const { data: room, error } = await supabase
        .from('rooms')
        .insert({ code, status: 'waiting', host_id: hostId })
        .select().single();
      if (error) { log('❌ ' + error.message, 'err'); return; }
      roomCode = room.code;
      document.getElementById('roomCodeBig').textContent = room.code;
      document.getElementById('roomBox').style.display = 'block';
      log('✅ Pokój: ' + room.code, 'ok');
      generateQR(room.code, 'qrCanvas');
      startPolling();
    } catch (e) {
      log('❌ ' + e.message, 'err');
    }
  })();
}

// Pokazuj QR gdy wpiszesz kod w trybie join
document.getElementById('inputJoinCode').oninput = () => {
  const code = document.getElementById('inputJoinCode').value.trim().toUpperCase();
  if (code.length === 5) {
    document.getElementById('joinQrBox').style.display = 'block';
    generateQR(code, 'joinQrCanvas');
  } else {
    document.getElementById('joinQrBox').style.display = 'none';
  }
};

// DOŁĄCZ DO POKOJU (dla mode=join)
document.getElementById('btnConfirmJoin').onclick = async () => {
  const code = document.getElementById('inputJoinCode').value.trim().toUpperCase();
  if (!code || code.length !== 5) {
    document.getElementById('joinStatus').innerHTML = '<span class="err">❌ Wpisz poprawny kod (5 znaków)</span>';
    return;
  }
  try {
    const { data: room, error } = await supabase.from('rooms').select('*').eq('code', code).single();
    if (error || !room) throw new Error('Pokój nie znaleziony: ' + code);
    roomCode = room.code;
    gameStarted = room.status === 'playing';
    document.getElementById('joinBox').style.display = 'none';
    document.getElementById('roomBox').style.display = 'block';
    document.getElementById('roomCodeBig').textContent = roomCode;
    document.getElementById('joinQrBox').style.display = 'none';
    log('✅ Połączono z pokojem: ' + room.code, 'ok');
    generateQR(room.code, 'qrCanvas');
    startPolling();
  } catch (e) {
    document.getElementById('joinStatus').innerHTML = '<span class="err">❌ ' + e.message + '</span>';
  }
};

// START GRY
document.getElementById('btnStart').onclick = async () => {
  log('🚀 Generuję plansze...', 'inf');
  const { data: players } = await supabase
    .from('players').select('*').eq('room_code', roomCode);
  if (!players || players.length < 2) { log('❌ Min. 2 graczy', 'err'); return; }
  const boardSize = CONFIG.BOARD_SIZES[players.length] || 10;
  log('📐 Plansza: ' + boardSize + '×' + boardSize, 'inf');
  try {
    const { sharedBoard, playerBoards, playerShips } = PLACEMENT.generateSharedBoard(boardSize, players);
    let successCount = 0;
    for (const player of players) {
      const { error } = await supabase
        .from('players')
        .update({ board: JSON.stringify(playerBoards[player.id]), ships: JSON.stringify(playerShips[player.id]) })
        .eq('id', player.id);
      if (error) { log('❌ ' + player.name + ': ' + error.message, 'err'); }
      else { successCount++; log('✅ ' + player.name + ' — ' + playerShips[player.id].length + ' statków', 'ok'); }
    }
    if (successCount === players.length) {
      const turnOrder = players.map(p => p.id).sort(() => Math.random() - 0.5);
      const firstPlayer = turnOrder[0];
      await supabase.from('rooms').update({
        status: 'playing',
        current_turn: firstPlayer,
        turn_order: turnOrder
      }).eq('code', roomCode);
      log('🎯 Gra rozpoczęta! Pierwszy: ' + players.find(p => p.id === firstPlayer)?.name, 'ok');
      
      gameStarted = true;
      document.getElementById('roomBox').style.display = 'none';
      document.getElementById('gameHeader').classList.add('active');
      document.getElementById('roomCodeSmall').textContent = roomCode;
      renderBoards(players);
    }
  } catch (e) {
    log('❌ ' + e.message, 'err');
  }
};
</script>

</body>
</html>
