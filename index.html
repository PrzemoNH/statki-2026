<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Statki 2026</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial; }
body { 
  min-height: 100vh; 
  background: radial-gradient(circle at top, #12213a, #070b14 60%); 
  color: #eaf2ff; 
  padding: 24px; 
  overflow-x: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}
body::before, body::after { 
  content: ""; 
  position: fixed; 
  width: 400px; 
  height: 400px; 
  border-radius: 50%; 
  filter: blur(120px); 
  z-index: -1; 
  opacity: 0.25; 
}
body::before { background: #00ff99; top: -100px; left: -120px; }
body::after { background: #3b82f6; bottom: -120px; right: -120px; }

.container { max-width: 600px; width: 100%; }

h1 { 
  font-size: 3rem; 
  letter-spacing: 2px; 
  margin-bottom: 12px; 
  color: #00ffb3; 
  text-align: center;
  text-shadow: 0 0 30px rgba(0,255,179,0.3);
}

.subtitle { 
  text-align: center; 
  color: #9fb0c8; 
  font-size: 1.1rem;
  margin-bottom: 40px;
}

.games-grid { 
  display: grid; 
  gap: 20px;
  margin-bottom: 20px;
}

.game-card { 
  padding: 28px; 
  border-radius: 16px; 
  background: rgba(255,255,255,0.04); 
  border: 1px solid rgba(255,255,255,0.08);
  transition: 0.3s ease;
}

.game-card:hover {
  background: rgba(255,255,255,0.06);
  border-color: rgba(0,255,179,0.2);
  transform: translateY(-2px);
}

.game-title { 
  font-size: 1.4rem; 
  color: #00ffb3; 
  font-weight: 700;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.game-desc { 
  color: #9fb0c8; 
  font-size: 14px;
  margin-bottom: 16px;
  line-height: 1.5;
}

.button-group { 
  display: grid; 
  grid-template-columns: 1fr 1fr 1fr;
  gap: 12px;
}

.btn {
  padding: 14px 16px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-weight: 600;
  font-size: 13px;
  transition: 0.25s ease;
  text-decoration: none;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  text-align: center;
  flex-direction: column;
}

.btn-host-create {
  background: linear-gradient(135deg, #ff6b6b, #ee5a6f);
  color: white;
}

.btn-host-create:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 30px rgba(255,107,107,0.3);
}

.btn-host-join {
  background: linear-gradient(135deg, #ffd166, #ffb700);
  color: #06121f;
}

.btn-host-join:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 30px rgba(255,209,102,0.3);
}

.btn-player {
  background: linear-gradient(135deg, #00ff99, #00c2ff);
  color: #06121f;
}

.btn-player:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 30px rgba(0,255,153,0.3);
}

.btn-disabled {
  background: rgba(255,255,255,0.08);
  color: #667;
  cursor: not-allowed;
  opacity: 0.5;
}

.btn-disabled:hover {
  transform: none;
  box-shadow: none;
}

.version { 
  text-align: center; 
  color: #4a6080; 
  font-size: 12px;
  margin-top: 20px;
}

@media (max-width: 600px) {
  h1 { font-size: 2.2rem; }
  .button-group { grid-template-columns: 1fr; }
  .btn { font-size: 14px; }
}
</style>
</head>
<body>

<div class="container">
  <h1>⚓ Statki 2026</h1>
  <p class="subtitle">Multiplayer Battle Game</p>

  <div class="games-grid">
    
    <!-- STATKI WARIANT 1 -->
    <div class="game-card">
      <div class="game-title">
        <span>🎮</span>
        Statki Wariant 1
      </div>
      <p class="game-desc">Dwie osobne mapy — gracz i wróg. Tradycyjna rozgrywka dla 2-4 graczy.</p>
      <div class="button-group">
        <a href="host-v1.html" class="btn btn-host-create">
          📺 Host<br><small>Utwórz</small>
        </a>
        <a href="host-v1.html?mode=join" class="btn btn-host-join">
          📺 Host<br><small>Dołącz</small>
        </a>
        <a href="player-v1.html" class="btn btn-player">
          📱 Gracz
        </a>
      </div>
    </div>

    <!-- STATKI WARIANT 2 (PRZYSZŁOŚĆ) -->
    <div class="game-card">
      <div class="game-title">
        <span>🚀</span>
        Statki Wariant 2
      </div>
      <p class="game-desc">Nowe zasady i mechaniki. Wkrótce dostępne!</p>
      <div class="button-group">
        <button class="btn btn-disabled" disabled>
          📺 Host<br><small>Utwórz</small>
        </button>
        <button class="btn btn-disabled" disabled>
          📺 Host<br><small>Dołącz</small>
        </button>
        <button class="btn btn-disabled" disabled>
          📱 Gracz
        </button>
      </div>
    </div>

  </div>

  <p class="version">v0.3.5 — Edycja 2026</p>
</div>

</body>
</html>
