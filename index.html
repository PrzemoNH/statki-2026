<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STATKI TV (Host)</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle, #0d1b2a, #000814);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.card {
  width: 480px;
  max-width: 90%;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(79,195,247,0.2);
  padding: 20px;
  border-radius: 15px;
  text-align: center;
  backdrop-filter: blur(10px);
}

#code {
  font-size: 70px;
  font-weight: 900;
  color: #4fc3f7;
}

.player {
  display: flex;
  justify-content: space-between;
  padding: 6px;
  margin: 5px 0;
  background: rgba(255,255,255,0.08);
  border-radius: 6px;
}
</style>
</head>

<body>

<div class="card">
  <h2>⚓ STATKI TV</h2>

  <div id="code">---</div>
  <div id="qrcode"></div>

  <h3>Gracze</h3>
  <div id="players"></div>

  <div id="status">init...</div>
</div>

<script>
const SUPABASE_URL = "https://YOUR_SUPABASE_URL.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhwdnl1d2xycm9ybHN3eXVteGVjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE5NzI2MjMsImV4cCI6MjA5NzU0ODYyM30.qZ8rtkAZd1AuIAUGNcJ4e-S3a0ZqSmqdTAA4GhSqeTQ";

const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let roomId;
let channel;

function log(t){
  document.getElementById("status").innerText = t;
}

async function createRoom(){
  const code = "T" + Math.floor(10 + Math.random() * 90);

  const { data, error } = await db
    .from("rooms")
    .insert([{ code, status: "waiting" }])
    .select()
    .single();

  if(error) {
    console.error(error);
    return null;
  }

  return data;
}

async function fetchPlayers(){
  const { data } = await db
    .from("players")
    .select("*")
    .eq("room_id", roomId);

  const box = document.getElementById("players");
  box.innerHTML = "";

  (data || []).forEach(p => {
    const div = document.createElement("div");
    div.className = "player";
    div.innerHTML = `<span>${p.nick}</span><span>${p.ready ? "READY" : "WAIT"}</span>`;
    box.appendChild(div);
  });
}

function subscribe(){
  if(channel) db.removeChannel(channel);

  channel = db.channel("room-" + roomId)
    .on("postgres_changes", {
      event: "*",
      schema: "public",
      table: "players",
      filter: `room_id=eq.${roomId}`
    }, () => {
      fetchPlayers();
    })
    .subscribe();

  fetchPlayers();
}

async function init(){
  const room = await createRoom();
  if(!room) return;

  roomId = room.id;

  document.getElementById("code").innerText = room.code;

  new QRCode(document.getElementById("qrcode"), {
    text: window.location.origin + "/player.html?room=" + room.code,
    width: 160,
    height: 160
  });

  subscribe();
  log("OK");
}

init();
</script>

</body>
</html>
