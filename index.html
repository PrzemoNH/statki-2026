<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Statki 2026 — Host</title>

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
}

body {
  min-height: 100vh;
  background: radial-gradient(circle at top, #12213a, #070b14 60%);
  color: #eaf2ff;
  padding: 24px;
  overflow-x: hidden;
}

body::before, body::after {
  content: "";
  position: fixed;
  width: 400px;
  height: 400px;
  border-radius: 50%;
  filter: blur(120px);
  z-index: -1;
  opacity: 0.25;
}

body::before {
  background: #00ff99;
  top: -100px;
  left: -120px;
}

body::after {
  background: #3b82f6;
  bottom: -120px;
  right: -120px;
}

h1 {
  font-size: 2.4rem;
  letter-spacing: 1px;
  margin-bottom: 6px;
  color: #00ffb3;
}

p { color: #9fb0c8; }

button {
  border: none;
  cursor: pointer;
  border-radius: 12px;
  padding: 14px 20px;
  font-weight: 600;
  transition: 0.25s ease;
}

#btnCreate {
  margin-top: 18px;
  background: linear-gradient(135deg, #00ff99, #00c2ff);
  color: #06121f;
  font-size: 16px;
  box-shadow: 0 10px 30px rgba(0,255,153,0.2);
}

#btnCreate:hover {
  transform: translateY(-2px);
  box-shadow: 0 15px 40px rgba(0,255,153,0.35);
}

#btnStart {
  width: 100%;
  margin-top: 18px;
  padding: 16px;
  font-size: 18px;
  background: #1a2233;
  color: #667;
  border: 1px solid #2b3b55;
  transition: 0.3s;
}

#btnStart.ready {
  background: linear-gradient(135deg, #00ff99, #00c2ff);
  color: #06121f;
  box-shadow: 0 0 25px rgba(0,255,153,0.25);
}

#roomBox {
  display: none;
  margin-top: 26px;
  padding: 20px;
  border-radius: 18px;
  background: rgba(255,255,255,0.04);
  backdrop-filter: blur(14px);
  border: 1px solid rgba(255,255,255,0.08);
  box-shadow: 0 20px 60px rgba(0,0,0,0.4);
}

#roomCode {
  font-size: 2.6rem;
  letter-spacing: 10px;
  color: #00ffb3;
  font-weight: 800;
  margin: 10px 0 20px;
  text-shadow: 0 0 20px rgba(0,255,179,0.3);
}

#playerList { margin-top: 10px; }

.player-item {
  padding: 12px 14px;
  margin: 8px 0;
  border-radius: 12px;
  background: rgba(255,255,255,0.05);
  display: flex;
  align-items: center;
  gap: 10px;
  transition: 0.2s;
  animation: fadeIn 0.3s ease;
}

.player-item:hover {
  transform: translateX(4px);
  background: rgba(255,255,255,0.08);
}

#gameInfo {
  margin-top: 16px;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}

#gameInfo p {
  background: rgba(255,255,255,0.05);
  padding: 10px;
  border-radius: 12px;
  text-align: center;
}

#debug {
  margin-top: 22px;
  padding: 14px;
  border-radius: 12px;
  background: rgba(0,0,0,0.4);
  border: 1px solid rgba(255,255,255,0.06);
  font-size: 12px;
  max-height: 180px;
  overflow: auto;
}

.ok  { color: #00ff99; }
.err { color: #ff4d4d; }
.inf { color: #ffd166; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}

@media (max-width: 600px) {
  body { padding: 16px; }
  #roomCode { font-size: 2rem; letter-spacing: 6px; }
}
</style>
</head>

<body>

<h1>⚓ Statki 2026</h1>
<p>Panel hosta — v0.0.1</p>

<button id="btnCreate">UTWÓRZ POKÓJ</button>

<div id="roomBox">
  <p>Kod pokoju:</p>
  <div id="roomCode">-----</div>
  <canvas id="qrCanvas" style="margin-top:14px; border-radius:12px; display:none;"></canvas>

  <p style="margin-top:16px">Gracze:</p>
  <div id="playerList"><p class="inf">Czekam na graczy...</p></div>

  <div id="gameInfo" style="display:none">
    <p>👥 <span id="infoPlayers">0</span></p>
    <p>📐 <span id="infoBoard">-</span></p>
  </div>

  <button id="btnStart" disabled>⚠️ Potrzeba min. 2 graczy</button>
</div>

<div id="debug"></div>

<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<script src="js/game/board.js"></script>
<script src="js/game/rules.js"></script>
<script src="js/game/placement.js"></script>

<script>
const CONFIG = {
  VERSION: '0.0.1',
  SUPABASE_URL: 'https://bmnffrnwnyrqefrzrhtf.supabase.co',
  SUPABASE_ANON_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJtbmZmcm53bnlycWVmcnpyaHRmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI1NTk2MDIsImV4cCI6MjA5ODEzNTYwMn0.irhBO6JX3PNXvJJFFEPcUEayzw-_cEJeBn9OsTcrGIE',
  BOARD_SIZES: { 2: 10, 3: 13, 4: 15 }
};

window.onerror = (msg, src, line) => {
  document.getElementById('debug').innerHTML += `<div class="err">JS: ${msg} (${line})</div>`;
};
</script>

<script type="module">
const debug = document.getElementById('debug');

function log(msg, type='inf') {
  const div = document.createElement('div');
  div.className = type;
  div.textContent = msg;
  debug.appendChild(div);
}

let supabase;
const { createClient } = await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm');
supabase = createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);

let currentRoomCode = null;

function generateCode() {
  const l = 'ABCDEFGHJKLMNPQRSTUVWXYZ';
  const d = '0123456789';
  return l[Math.random()*l.length|0] + l[Math.random()*l.length|0] + l[Math.random()*l.length|0]
       + d[Math.random()*d.length|0] + d[Math.random()*d.length|0];
}

function updateGameInfo(players) {
  const count = players.length;
  const size = CONFIG.BOARD_SIZES[count] || 10;

  document.getElementById('gameInfo').style.display = 'grid';
  document.getElementById('infoPlayers').textContent = count;
  document.getElementById('infoBoard').textContent = size + '×' + size;

  const btn = document.getElementById('btnStart');
  btn.style.display = 'block';

  if (count >= 2) {
    btn.disabled = false;
    btn.classList.add('ready');
    btn.textContent = `START (${count} graczy)`;
  } else {
    btn.disabled = true;
    btn.classList.remove('ready');
    btn.textContent = '⚠️ Min. 2 graczy';
  }
}

function render(players) {
  const box = document.getElementById('playerList');

  if (!players?.length) {
    box.innerHTML = '<p class="inf">Czekam na graczy...</p>';
    updateGameInfo([]);
    return;
  }

  box.innerHTML = players.map(p => `
    <div class="player-item">
      <span style="color:${p.color}">●</span>
      <b>${p.name}</b>
    </div>
  `).join('');

  updateGameInfo(players);
}

async function fetchPlayers() {
  if (!currentRoomCode) return;
  const { data, error } = await supabase
    .from('players')
    .select('*')
    .eq('room_code', currentRoomCode)
    .order('joined_at', { ascending: true });
  log('🔍 fetchPlayers: ' + (data?.length || 0) + ' graczy, error: ' + (error?.message || 'brak'), 'inf');
  render(data || []);
}


document.getElementById('btnCreate').onclick = async () => {
  log('Tworzę pokój...', 'inf');

  const hostId = localStorage.getItem('host') || (localStorage.setItem('host', Math.random().toString(36)), localStorage.getItem('host'));
  const code = generateCode();

  const { data: room, error } = await supabase
    .from('rooms')
    .insert({ code, host_id: hostId, status: 'waiting' })
    .select()
    .single();

  if (error) { log('❌ ' + error.message, 'err'); return; }

  currentRoomCode = room.code;
  document.getElementById('roomCode').textContent = room.code;
  document.getElementById('roomBox').style.display = 'block';
  log('Pokój: ' + room.code, 'ok');

  const playerUrl = window.location.origin + '/player.html?code=' + room.code;
  const canvas = document.getElementById('qrCanvas');
  canvas.style.display = 'block';
  QRCode.toCanvas(canvas, playerUrl, { width: 180, margin: 1, color: { dark: '#00ffb3', light: '#070b14' }});

  supabase.channel('players-' + room.code)
    .on('postgres_changes', { event: '*', schema: 'public', table: 'players' }, fetchPlayers)
    .subscribe((status) => {
      log('📡 Realtime: ' + status, status === 'SUBSCRIBED' ? 'ok' : 'inf');
    });

  setInterval(fetchPlayers, 3000);
};

document.getElementById('btnStart').onclick = async () => {
  log('🚀 Generuję plansze...', 'inf');

  const { data: players } = await supabase
    .from('players')
    .select('*')
    .eq('room_code', currentRoomCode);

  const boardSize = CONFIG.BOARD_SIZES[players.length] || 10;
  log('📐 Rozmiar planszy: ' + boardSize + '×' + boardSize, 'inf');

  for (const player of players) {
    const { grid, ships } = PLACEMENT.generate(boardSize);
    log('✅ ' + player.name + ' — statków: ' + ships.length, 'ok');
  }

  log('🎯 Wszystkie plansze wygenerowane!', 'ok');
};

log('System gotowy', 'ok');
</script>

</body>
</html>
