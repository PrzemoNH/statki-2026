<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
}

body {
  min-height: 100vh;
  background: radial-gradient(circle at top, #12213a, #070b14 60%);
  color: #eaf2ff;
  padding: 24px;
  overflow-x: hidden;
}

body::before, body::after {
  content: "";
  position: fixed;
  width: 400px;
  height: 400px;
  border-radius: 50%;
  filter: blur(120px);
  z-index: -1;
  opacity: 0.25;
}

body::before {
  background: #00ff99;
  top: -100px;
  left: -120px;
}

body::after {
  background: #3b82f6;
  bottom: -120px;
  right: -120px;
}

h1 {
  font-size: 2.4rem;
  letter-spacing: 1px;
  margin-bottom: 6px;
  color: #00ffb3;
}

p { color: #9fb0c8; }

button {
  border: none;
  cursor: pointer;
  border-radius: 12px;
  padding: 14px 20px;
  font-weight: 600;
  transition: 0.25s ease;
}
