<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STATKI TV - DEBUG</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:radial-gradient(circle at top,#0d1b2a,#000814);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
width:520px;
max-width:95vw;
background:rgba(255,255,255,0.05);
border:1px solid rgba(79,195,247,0.25);
border-radius:20px;
padding:20px;
text-align:center;
backdrop-filter:blur(10px);
}

#code{
font-size:64px;
font-weight:900;
color:#4fc3f7;
letter-spacing:4px;
}

#players{
margin-top:15px;
text-align:left;
}

.player{
padding:8px;
margin:6px 0;
background:rgba(255,255,255,0.08);
border-radius:8px;
display:flex;
justify-content:space-between;
}

.status{
margin-top:10px;
font-size:12px;
color:#aaa;
white-space:pre-line;
}

.debug{
margin-top:15px;
padding:10px;
font-size:12px;
background:rgba(0,0,0,0.4);
border-radius:10px;
text-align:left;
max-height:160px;
overflow:auto;
}
</style>
</head>

<body>

<div class="card">

<h2>⚓ STATKI TV (DEBUG)</h2>

<div id="code">---</div>

<div id="qrcode"></div>

<h3>Gracze</h3>
<div id="players"></div>

<div class="status" id="status">INIT...</div>

<div class="debug" id="debug"></div>

</div>

<script>

/* ========================================= */
/* JS - KONFIGURACJA */
/* ========================================= */

const supabaseUrl = "https://hpvyuwlrrorlswyumxec.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhwdnl1d2xycm9ybHN3eXVteGVjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE5NzI2MjMsImV4cCI6MjA5NzU0ODYyM30.qZ8rtkAZd1AuIAUGNcJ4e-S3a0ZqSmqdTAA4GhSqeTQ";

const db = supabase.createClient(supabaseUrl, supabaseKey);

/* ========================================= */
/* JS - DEBUG */
/* ========================================= */

function debug(msg){
const box = document.getElementById("debug");
box.innerHTML += msg + "<br>";
console.log(msg);
}

function logStatus(msg){
document.getElementById("status").innerText = msg;
debug("STATUS: " + msg);
}

/* ========================================= */
/* JS - ROOM */
/* ========================================= */

let room = null;
let channel = null;

async function createRoom(){

logStatus("CREATING ROOM...");

let code = "T" + Math.floor(10 + Math.random()*89);

const {data,error} = await db
.from("rooms")
.insert([{code, status:"waiting"}])
.select()
.single();

if(error){
debug("❌ ROOM ERROR");
debug(JSON.stringify(error, null, 2));
logStatus("FAILED");
return null;
}

debug("✅ ROOM CREATED");
debug(JSON.stringify(data));

return data;
}

/* ========================================= */
/* JS - FETCH PLAYERS */
/* ========================================= */

async function fetchPlayers(){

const {data,error} = await db
.from("players")
.select("*")
.eq("room_id",room.id);

if(error){
debug("❌ PLAYERS ERROR");
debug(JSON.stringify(error, null, 2));
return;
}

renderPlayers(data || []);
}

/* ========================================= */
/* JS - RENDER */
/* ========================================= */

function renderPlayers(players){

const box = document.getElementById("players");
box.innerHTML = "";

players.forEach(p => {

const div = document.createElement("div");
div.className = "player";

div.innerHTML = `
<span>${p.nick || "Player"}</span>
<span>${p.ready ? "✔ READY" : "WAIT"}</span>
`;

div.style.borderLeft = "4px solid " + (p.color || "#4fc3f7");

box.appendChild(div);

});

}

/* ========================================= */
/* JS - REALTIME */
/* ========================================= */

function subscribePlayers(){

if(channel){
db.removeChannel(channel);
}

channel = db.channel("room-"+room.id)
.on("postgres_changes",
{
event:"*",
schema:"public",
table:"players",
filter:"room_id=eq."+room.id
},
fetchPlayers
)
.subscribe();

debug("📡 Realtime subscribed");

fetchPlayers();
}

/* ========================================= */
/* JS - INIT */
/* ========================================= */

async function init(){

logStatus("INIT...");

debug("Connecting Supabase...");
debug("URL: " + supabaseUrl);

room = await createRoom();

if(!room){
return;
}

document.getElementById("code").innerText = room.code;

/* QR */
new QRCode(document.getElementById("qrcode"),{
text: window.location.origin + "/player.html?room=" + room.code,
width:160,
height:160
});

subscribePlayers();

logStatus("READY");
}

init();

</script>

</body>
</html>
