<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STATKI PLAYER</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#000814;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
width:420px;
background:rgba(255,255,255,0.05);
padding:20px;
border-radius:15px;
text-align:center;
}

input,button{
width:100%;
padding:10px;
margin-top:10px;
border-radius:8px;
border:none;
}

button{
background:#4fc3f7;
font-weight:bold;
cursor:pointer;
}

#players{
margin-top:15px;
text-align:left;
}

.player{
padding:6px;
margin:5px 0;
background:rgba(255,255,255,0.08);
border-radius:6px;
}
</style>
</head>

<body>

<div class="card">

<h2>PLAYER</h2>

<input id="nick" placeholder="Twój nick">

<input id="room" placeholder="Kod pokoju">

<button onclick="join()">DOŁĄCZ</button>

<div id="status">INIT</div>

<div id="players"></div>

</div>

<script>

/* CONFIG */
const supabaseUrl = "https://hpvyuwlrrorlswyumxec.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhwdnl1d2xycm9ybHN3eXVteGVjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE5NzI2MjMsImV4cCI6MjA5NzU0ODYyM30.qZ8rtkAZd1AuIAUGNcJ4e-S3a0ZqSmqdTAA4GhSqeTQ";

const db = supabase.createClient(supabaseUrl, supabaseKey);

/* STATE */
let roomData = null;
let channel = null;

/* STATUS */
function log(t){
document.getElementById("status").innerText = t;
}

/* JOIN ROOM */
async function join(){

const nick = document.getElementById("nick").value;
const code = document.getElementById("room").value;

if(!nick || !code){
log("BRAK DANYCH");
return;
}

log("SZUKAM POKOJU...");

const {data, error} = await db
.from("rooms")
.select("*")
.eq("code", code)
.single();

if(error){
log("ROOM NIE ISTNIEJE");
return;
}

roomData = data;

log("DOŁĄCZANIE...");

const {error: insErr} = await db
.from("players")
.insert([{
room_id: roomData.id,
nick: nick,
ready: false,
color: "#4fc3f7"
}]);

if(insErr){
console.log(insErr);
log("BŁĄD JOIN");
return;
}

log("POŁĄCZONO");

subscribe();
}

/* REALTIME */
function subscribe(){

if(channel) db.removeChannel(channel);

channel = db.channel("players-"+roomData.id)
.on("postgres_changes",
{
event:"*",
schema:"public",
table:"players",
filter:"room_id=eq."+roomData.id
},
fetchPlayers
)
.subscribe();

fetchPlayers();
}

/* FETCH */
async function fetchPlayers(){

const {data} = await db
.from("players")
.select("*")
.eq("room_id", roomData.id);

render(data || []);
}

/* RENDER */
function render(players){

const box = document.getElementById("players");
box.innerHTML = "";

players.forEach(p => {

const div = document.createElement("div");
div.className = "player";

div.innerHTML = `${p.nick} - ${p.ready ? "READY" : "WAIT"}`;

box.appendChild(div);

});

}

</script>

</body>
</html>
