<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PLAYER</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background: radial-gradient(circle, #0d1b2a, #000814);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card{
  width:420px;
  max-width:90%;
  background:rgba(255,255,255,0.05);
  padding:20px;
  border-radius:15px;
  border:1px solid rgba(79,195,247,0.2);
}

input,button{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  border:none;
}

button{
  background:#4fc3f7;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="card">
  <h2>PLAYER</h2>

  <input id="nick" placeholder="Nick">
  <input id="room" placeholder="Kod (np. T12)">
  <button onclick="join()">JOIN</button>

  <div id="status">---</div>
  <div id="players"></div>
</div>

<script>
const SUPABASE_URL = "https://YOUR_SUPABASE_URL.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhwdnl1d2xycm9ybHN3eXVteGVjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE5NzI2MjMsImV4cCI6MjA5NzU0ODYyM30.qZ8rtkAZd1AuIAUGNcJ4e-S3a0ZqSmqdTAA4GhSqeTQ";

const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let roomId;

function log(t){ document.getElementById("status").innerText = t; }

async function join(){
  const nick = document.getElementById("nick").value.trim();
  const code = document.getElementById("room").value.trim().toUpperCase();

  const { data: room } = await db
    .from("rooms")
    .select("id")
    .eq("code", code)
    .maybeSingle();

  if(!room){
    log("Brak pokoju");
    return;
  }

  roomId = room.id;

  const { data: exists } = await db
    .from("players")
    .select("id")
    .eq("room_id", roomId)
    .eq("nick", nick);

  if(exists?.length){
    log("Nick zajęty");
    return;
  }

  await db.from("players").insert([{
    room_id: roomId,
    nick,
    ready:false,
    color:"#4fc3f7"
  }]);

  log("OK joined");

  fetchPlayers();
}

async function fetchPlayers(){
  const { data } = await db
    .from("players")
    .select("*")
    .eq("room_id", roomId);

  const box = document.getElementById("players");
  box.innerHTML = "";

  (data || []).forEach(p=>{
    const div = document.createElement("div");
    div.innerHTML = `${p.nick} - ${p.ready?"READY":"WAIT"}`;
    box.appendChild(div);
  });
}
</script>

</body>
</html>
