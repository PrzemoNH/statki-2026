<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Statki 2026 — Host</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui; }
body { background: #070b14; color: #eaf2ff; padding: 24px; }
h1 { color: #00ffb3; margin-bottom: 16px; }
button { padding: 12px 20px; background: #00ff99; color: #06121f; font-weight: 700; border: none; border-radius: 8px; cursor: pointer; margin-bottom: 16px; }
#log { background: #111; padding: 12px; border-radius: 8px; font-size: 13px; min-height: 200px; }
.ok { color: #00ff99; } .err { color: #ff4d4d; } .inf { color: #ffd166; }
</style>
</head>
<body>

<h1>⚓ Statki 2026 — DEBUG</h1>
<button id="btnCreate">UTWÓRZ POKÓJ</button>
<div id="playerList" style="margin-bottom:16px; font-size:18px;"></div>
<div id="log"></div>

<script>
const SUPABASE_URL = 'https://bmnffrnwnyrqefrzrhtf.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJtbmZmcm53bnlycWVmcnpyaHRmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI1NTk2MDIsImV4cCI6MjA5ODEzNTYwMn0.irhBO6JX3PNXvJJFFEPcUEayzw-_cEJeBn9OsTcrGIE';
</script>

<script type="module">
const logDiv = document.getElementById('log');
const playerDiv = document.getElementById('playerList');

function log(msg, type='inf') {
  const d = document.createElement('div');
  d.className = type;
  d.textContent = new Date().toLocaleTimeString() + ' — ' + msg;
  logDiv.appendChild(d);
  logDiv.scrollTop = logDiv.scrollHeight;
}

log('Ładuję Supabase...', 'inf');

let supabase;
try {
  const { createClient } = await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm');
  supabase = createClient(SUPABASE_URL, SUPABASE_KEY);
  log('✅ Supabase OK', 'ok');
} catch(e) {
  log('❌ Supabase błąd: ' + e.message, 'err');
}

let roomCode = null;

async function fetchPlayers() {
  if (!roomCode) return;
  const { data, error } = await supabase
    .from('players')
    .select('*')
    .eq('room_code', roomCode);
  if (error) { log('❌ ' + error.message, 'err'); return; }
  log('👥 Graczy: ' + (data?.length || 0), data?.length ? 'ok' : 'inf');
  playerDiv.innerHTML = (data || []).map(p => `<div style="color:${p.color}">● ${p.name}</div>`).join('');
}

document.getElementById('btnCreate').onclick = async () => {
  log('Tworzę pokój...', 'inf');
  const code = 'TST' + Math.floor(Math.random()*90+10);
  const { data: room, error } = await supabase
    .from('rooms')
    .insert({ code, host_id: 'host_test', status: 'waiting' })
    .select()
    .single();
  if (error) { log('❌ ' + error.message, 'err'); return; }
  roomCode = room.code;
  log('✅ Pokój: ' + roomCode, 'ok');
  setInterval(() => { fetchPlayers(); }, 3000);
  log('✅ Interval uruchomiony', 'ok');
};

log('Gotowy', 'ok');
</script>

</body>
</html>
