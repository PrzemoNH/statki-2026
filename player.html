<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Statki 2026 — Gracz</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at top, #12213a, #070b14 60%);
      color: #eaf2ff;
      padding: 24px;
      max-width: 480px;
      margin: 0 auto;
    }

    body::before, body::after {
      content: "";
      position: fixed;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      filter: blur(120px);
      z-index: -1;
      opacity: 0.25;
    }

    body::before {
      background: #00ff99;
      top: -100px;
      left: -120px;
    }

    body::after {
      background: #3b82f6;
      bottom: -120px;
      right: -120px;
    }

    h1 {
      font-size: 2.4rem;
      letter-spacing: 1px;
      margin-bottom: 6px;
      color: #00ffb3;
    }

    h1 + p {
      color: #9fb0c8;
      margin-bottom: 24px;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      margin: 8px 0;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.12);
      color: #eaf2ff;
      font-size: 18px;
      border-radius: 12px;
      outline: none;
      transition: 0.2s;
      backdrop-filter: blur(8px);
    }

    input:focus {
      border-color: #00ffb3;
      background: rgba(0,255,179,0.05);
      box-shadow: 0 0 0 3px rgba(0,255,179,0.1);
    }

    input::placeholder {
      color: #4a6080;
    }

    button {
      width: 100%;
      padding: 16px;
      margin-top: 14px;
      background: linear-gradient(135deg, #00ff99, #00c2ff);
      color: #06121f;
      font-size: 18px;
      font-weight: 700;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: 0.25s ease;
      box-shadow: 0 10px 30px rgba(0,255,153,0.2);
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 15px 40px rgba(0,255,153,0.35);
    }

    button:disabled {
      background: #1a2233;
      color: #445;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
      border: 1px solid #2b3b55;
    }

    #status {
      margin-top: 20px;
      padding: 14px 16px;
      border-radius: 12px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      min-height: 48px;
      font-size: 15px;
    }

    .ok  { color: #00ff99; }
    .err { color: #ff4d4d; }
    .inf { color: #ffd166; }
  </style>
</head>
<body>

<h1>⚓ Statki 2026</h1>
<p>Dołącz do gry</p>

<input id="inputCode" type="text" placeholder="Kod pokoju (np. ABC12)" maxlength="5" autocomplete="off" autocapitalize="characters">
<input id="inputName" type="text" placeholder="Twój nick" maxlength="16" autocomplete="off">
<button id="btnJoin">DOŁĄCZ</button>

<div id="status"></div>

<script>
  const CONFIG = {
    SUPABASE_URL: 'https://bmnffrnwnyrqefrzrhtf.supabase.co',
    SUPABASE_ANON_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJtbmZmcm53bnlycWVmcnpyaHRmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI1NTk2MDIsImV4cCI6MjA5ODEzNTYwMn0.irhBO6JX3PNXvJJFFEPcUEayzw-_cEJeBn9OsTcrGIE'
  };
</script>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

  const supabase = createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);

  const COLORS = ['#ff4444','#4488ff','#ffaa00','#aa44ff'];

  // Autowypełnienie kodu z URL (?code=ABC12)
  const urlParams = new URLSearchParams(window.location.search);
  const codeFromUrl = urlParams.get('code');
  if (codeFromUrl) {
    document.getElementById('inputCode').value = codeFromUrl.toUpperCase();
  }

  function generateDeviceId() {
    let id = localStorage.getItem('device_id');
    if (!id) {
      id = 'dev_' + Math.random().toString(36).substr(2, 12);
      localStorage.setItem('device_id', id);
    }
    return id;
  }

  function log(msg, type = 'inf') {
    const div = document.getElementById('status');
    div.innerHTML = `<p class="${type}">${msg}</p>`;
  }

  document.getElementById('btnJoin').addEventListener('click', async () => {
    const code = document.getElementById('inputCode').value.trim().toUpperCase();
    const name = document.getElementById('inputName').value.trim();
    const btn = document.getElementById('btnJoin');

    if (!code || code.length !== 5) return log('❌ Wpisz poprawny kod pokoju (5 znaków)', 'err');
    if (!name || name.length < 2) return log('❌ Nick musi mieć min. 2 znaki', 'err');

    btn.disabled = true;
    log('⏳ Łączenie...', 'inf');

    try {
      const { data: room, error: roomErr } = await supabase
        .from('rooms')
        .select('*')
        .eq('code', code)
        .single();

      if (roomErr || !room) throw new Error('Nie znaleziono pokoju: ' + code);
      if (room.status !== 'waiting') throw new Error('Gra już się rozpoczęła');

      const deviceId = generateDeviceId();

      const { data: existing } = await supabase
        .from('players')
        .select('*')
        .eq('room_code', code)
        .eq('device_id', deviceId)
        .single();

      let player;
      if (existing) {
        player = existing;
        log('✅ Witaj z powrotem, ' + player.name + '!', 'ok');
      } else {
        const { data: currentPlayers } = await supabase
          .from('players')
          .select('*')
          .eq('room_code', code);

        if (currentPlayers && currentPlayers.length >= 4) throw new Error('Pokój jest pełny (max 4 graczy)');

        const color = COLORS[currentPlayers ? currentPlayers.length % COLORS.length : 0];

        const { data: newPlayer, error: playerErr } = await supabase
          .from('players')
          .insert({ room_code: code, device_id: deviceId, name, color, status: 'waiting', is_host: false })
          .select()
          .single();

        if (playerErr) throw playerErr;
        player = newPlayer;
        log('✅ Dołączono do pokoju ' + code + ' jako ' + name, 'ok');
      }

    } catch (err) {
      log('❌ ' + err.message, 'err');
      btn.disabled = false;
    }
  });
</script>

</body>
</html>
