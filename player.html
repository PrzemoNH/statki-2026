<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Statki 2026 — Gracz v2</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial; }
body { min-height: 100vh; background: radial-gradient(circle at top, #12213a, #070b14 60%); color: #eaf2ff; padding: 24px; overflow-x: hidden; }
body::before, body::after { content: ""; position: fixed; width: 400px; height: 400px; border-radius: 50%; filter: blur(120px); z-index: -1; opacity: 0.25; }
body::before { background: #00ff99; top: -100px; left: -120px; }
body::after { background: #3b82f6; bottom: -120px; right: -120px; }
h1 { font-size: 2.4rem; letter-spacing: 1px; margin-bottom: 6px; color: #00ffb3; }
p { color: #9fb0c8; }
input { width: 100%; padding: 14px 16px; margin: 8px 0; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.12); color: #eaf2ff; font-size: 18px; border-radius: 12px; outline: none; }
input:focus { border-color: #00ffb3; background: rgba(0,255,179,0.05); box-shadow: 0 0 0 3px rgba(0,255,179,0.1); }
input::placeholder { color: #4a6080; }
button { border: none; cursor: pointer; border-radius: 12px; padding: 14px 20px; font-weight: 600; transition: 0.25s ease; }
button { width: 100%; padding: 16px; margin-top: 14px; background: linear-gradient(135deg, #00ff99, #00c2ff); color: #06121f; font-size: 18px; font-weight: 700; }
button:hover { transform: translateY(-2px); box-shadow: 0 15px 40px rgba(0,255,153,0.35); }
button:disabled { background: #1a2233; color: #445; cursor: not-allowed; transform: none; box-shadow: none; border: 1px solid #2b3b55; }
#status { margin-top: 20px; padding: 14px 16px; border-radius: 12px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); min-height: 48px; font-size: 15px; }
.ok { color: #00ff99; } .err { color: #ff4d4d; } .inf { color: #ffd166; }
#joinScreen { max-width: 480px; margin: 0 auto; }
#waitingScreen { display: none; text-align: center; margin-top: 40px; max-width: 480px; margin-left: auto; margin-right: auto; }
#waitingScreen h2 { color: #00ffb3; font-size: 1.6rem; margin-bottom: 12px; }
.pulse { display: inline-block; width: 16px; height: 16px; background: #00ffb3; border-radius: 50%; animation: pulse 1.4s infinite; margin: 0 4px; }
.pulse:nth-child(2) { animation-delay: 0.2s; }
.pulse:nth-child(3) { animation-delay: 0.4s; }
@keyframes pulse { 0%,80%,100% { transform: scale(0.6); opacity: 0.4; } 40% { transform: scale(1); opacity: 1; } }
#gameScreen { display: none; }
#boardsSwitcher { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
.switchBtn { flex: 1; min-width: 100px; padding: 10px; margin: 0; background: rgba(255,255,255,0.08); color: #eaf2ff; border: 1px solid rgba(255,255,255,0.15); border-radius: 8px; cursor: pointer; font-size: 14px; transition: 0.2s; }
.switchBtn:hover { background: rgba(255,255,255,0.12); }
.switchBtn.active { background: linear-gradient(135deg, #00ff99, #00c2ff); color: #06121f; border-color: #00ffb3; }
.boardContainer { margin-top: 20px; }
#boardHeader { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
.playerBadge { display: flex; align-items: center; gap: 8px; }
.colorDot { width: 24px; height: 24px; border-radius: 50%; }
.playerName { font-size: 1.1rem; color: #00ffb3; font-weight: 700; }
#boardInfo { color: #9fb0c8; font-size: 13px; }
#boardGrid { display: inline-grid; gap: 1px; margin-top: 10px; background: #1a2a40; border: 1px solid #1a2a40; }
.cell { width: 32px; height: 32px; background: #0a1520; transition: 0.15s; cursor: pointer; }
.cell:hover { background: rgba(255,255,255,0.07); }
.cell.ship { background: rgba(0,255,179,0.4); }
.cell.hit { background: rgba(255,77,77,0.6); }
.cell.miss { background: rgba(80,80,100,0.5); }
.cell.hidden { background: #0d1d30; }
#btnHide { margin-top: 16px; background: rgba(255,255,255,0.08); color: #eaf2ff; border: 1px solid rgba(255,255,255,0.15); font-size: 15px; padding: 12px; width: 100%; }
#btnHide:hover { background: rgba(255,255,255,0.14); transform: none; box-shadow: none; }
@media (max-width: 600px) { body { padding: 16px; } h1 { font-size: 1.8rem; } .cell { width: 28px; height: 28px; } }
</style>
</head>
<body>

<h1>⚓ Statki 2026</h1>
<p>Gracz — v0.2.2</p>

<!-- DOŁĄCZANIE -->
<div id="joinScreen">
  <input id="inputCode" type="text" placeholder="Kod pokoju (np. ABC12)" maxlength="5" autocomplete="off" autocapitalize="characters">
  <input id="inputName" type="text" placeholder="Twój nick" maxlength="16" autocomplete="off">
  <button id="btnJoin">DOŁĄCZ</button>
  <div id="status"></div>
</div>

<!-- CZEKANIE NA START -->
<div id="waitingScreen">
  <h2>Czekam na start gry</h2>
  <p style="color:#9fb0c8; margin-bottom:24px">Host zaraz rozpocznie rozgrywkę</p>
  <div>
    <span class="pulse"></span>
    <span class="pulse"></span>
    <span class="pulse"></span>
  </div>
  <p id="waitingName" style="margin-top:24px; color:#00ffb3; font-size:1.1rem"></p>
</div>

<!-- GRA -->
<div id="gameScreen">
  <div id="boardsSwitcher"></div>
  <div class="boardContainer">
    <div id="boardHeader">
      <div class="playerBadge">
        <div class="colorDot" id="boardColorDot"></div>
        <span class="playerName" id="boardPlayerName">---</span>
      </div>
    </div>
    <p id="boardInfo" style="margin-bottom: 10px;"></p>
    <div id="boardGrid"></div>
    <button id="btnHide">👁 Ukryj planszę</button>
  </div>
</div>

<script>
const CONFIG = {
  SUPABASE_URL: 'https://bmnffrnwnyrqefrzrhtf.supabase.co',
  SUPABASE_ANON_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJtbmZmcm53bnlycWVmcnpyaHRmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI1NTk2MDIsImV4cCI6MjA5ODEzNTYwMn0.irhBO6JX3PNXvJJFFEPcUEayzw-_cEJeBn9OsTcrGIE'
};
</script>

<script type="module">
const { createClient } = await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm');
const supabase = createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);

const COLORS = ['#ff4444','#4488ff','#ffaa00','#aa44ff'];
let myPlayerId = null;
let myName = null;
let myColor = null;
let roomCode = null;
let allPlayers = [];
let currentViewingPlayerId = null;
let boardHidden = false;
let pollingInterval = null;

const urlParams = new URLSearchParams(window.location.search);
const codeFromUrl = urlParams.get('code');
if (codeFromUrl) document.getElementById('inputCode').value = codeFromUrl.toUpperCase();

function generateDeviceId() {
  let id = localStorage.getItem('device_id');
  if (!id) { id = 'dev_' + Math.random().toString(36).substr(2, 12); localStorage.setItem('device_id', id); }
  return id;
}

function log(msg, type='inf') {
  const div = document.getElementById('status');
  div.innerHTML = `<p class="${type}">${msg}</p>`;
}

function renderBoard(board, playerColor, boardSize, isMyBoard) {
  const grid = document.getElementById('boardGrid');
  grid.style.gridTemplateColumns = `repeat(${boardSize}, 32px)`;
  grid.innerHTML = '';

  for (let i = 0; i < board.length; i++) {
    const cell = board[i];
    const cellDiv = document.createElement('div');
    cellDiv.className = 'cell';

    if (isMyBoard) {
      // MOJA MAPA: statki ukryte, pokazuj tylko trafienia
      if (cell.hit && cell.state === 'ship') {
        cellDiv.classList.add('hit');
      } else if (cell.hit && cell.state === 'water') {
        cellDiv.classList.add('miss');
      }
      // Statki NIE widoczne - pusta kratka
    } else {
      // MAPA WROGA: tylko trafienia i pudła
      if (cell.hit && cell.state === 'ship') {
        cellDiv.classList.add('hit');
      } else if (cell.hit && cell.state === 'water') {
        cellDiv.classList.add('miss');
      }
    }

    grid.appendChild(cellDiv);
  }
}

function updateBoardsSwitcher() {
  const switcher = document.getElementById('boardsSwitcher');
  switcher.innerHTML = '';
  allPlayers.forEach(player => {
    const btn = document.createElement('button');
    btn.className = 'switchBtn';
    if (player.id === currentViewingPlayerId) btn.classList.add('active');
    btn.textContent = player.id === myPlayerId ? '📍 Moja mapa' : `👤 ${player.name}`;
    btn.onclick = () => {
      currentViewingPlayerId = player.id;
      updateBoardsSwitcher();
      renderCurrentBoard();
    };
    switcher.appendChild(btn);
  });
}

function renderCurrentBoard() {
  if (!currentViewingPlayerId) return;
  const player = allPlayers.find(p => p.id === currentViewingPlayerId);
  if (!player || !player.board) return;
  const boardData = typeof player.board === 'string' ? JSON.parse(player.board) : player.board;
  const boardSize = Math.sqrt(boardData.length);
  const shipCount = (typeof player.ships === 'string' ? JSON.parse(player.ships) : player.ships)?.length || 0;
  const isMyBoard = currentViewingPlayerId === myPlayerId;
  document.getElementById('boardColorDot').style.backgroundColor = player.color;
  document.getElementById('boardPlayerName').textContent = player.name;
  document.getElementById('boardInfo').textContent = `Statków: ${shipCount} | Plansza: ${boardSize}×${boardSize}`;
  renderBoard(boardData, player.color, boardSize, isMyBoard);
}

function startPolling() {
  pollingInterval = setInterval(async () => {
    if (!roomCode) return;
    const { data: players } = await supabase.from('players').select('*').eq('room_code', roomCode);
    if (players) {
      allPlayers = players;
      if (!currentViewingPlayerId) currentViewingPlayerId = myPlayerId;
      updateBoardsSwitcher();
      renderCurrentBoard();
    }
  }, 2000);
}

function showGame() {
  document.getElementById('joinScreen').style.display = 'none';
  document.getElementById('waitingScreen').style.display = 'none';
  document.getElementById('gameScreen').style.display = 'block';
  startPolling();
}

document.getElementById('btnHide').onclick = () => {
  boardHidden = !boardHidden;
  document.getElementById('boardGrid').style.opacity = boardHidden ? '0' : '1';
  document.getElementById('btnHide').textContent = boardHidden ? '👁 Pokaż planszę' : '👁 Ukryj planszę';
};

document.getElementById('btnJoin').addEventListener('click', async () => {
  const code = document.getElementById('inputCode').value.trim().toUpperCase();
  const name = document.getElementById('inputName').value.trim();
  const btn = document.getElementById('btnJoin');

  if (!code || code.length !== 5) return log('❌ Wpisz poprawny kod pokoju (5 znaków)', 'err');
  if (!name || name.length < 2) return log('❌ Nick musi mieć min. 2 znaki', 'err');

  btn.disabled = true;
  log('⏳ Łączenie...', 'inf');

  try {
    const { data: room, error: roomErr } = await supabase.from('rooms').select('*').eq('code', code).single();
    if (roomErr || !room) throw new Error('Nie znaleziono pokoju: ' + code);
    if (room.status === 'playing') {
      roomCode = room.code;
      currentViewingPlayerId = null;
    } else if (room.status !== 'waiting') {
      throw new Error('Pokój ma zły status');
    } else {
      roomCode = room.code;
    }

    const deviceId = generateDeviceId();
    const { data: existing } = await supabase.from('players').select('*').eq('room_code', code).eq('device_id', deviceId).single();

    let player;
    if (existing) {
      player = existing;
    } else {
      const { data: currentPlayers } = await supabase.from('players').select('*').eq('room_code', code);
      if (currentPlayers && currentPlayers.length >= 4) throw new Error('Pokój jest pełny (max 4 graczy)');
      const color = COLORS[currentPlayers ? currentPlayers.length % COLORS.length : 0];
      const { data: newPlayer, error: playerErr } = await supabase
        .from('players')
        .insert({ room_code: code, device_id: deviceId, name, color, status: 'waiting', is_host: false })
        .select().single();
      if (playerErr) throw playerErr;
      player = newPlayer;
    }

    myPlayerId = player.id;
    myName = player.name;
    myColor = player.color;

    document.getElementById('joinScreen').style.display = 'none';

    if (room.status === 'playing') {
      showGame();
    } else {
      document.getElementById('waitingScreen').style.display = 'block';
      document.getElementById('waitingName').textContent = '👤 ' + player.name;
      const checkGameStart = setInterval(async () => {
        const { data: updated } = await supabase.from('rooms').select('*').eq('code', code).single();
        if (updated?.status === 'playing') {
          clearInterval(checkGameStart);
          showGame();
        }
      }, 1000);
    }
  } catch (err) {
    log('❌ ' + err.message, 'err');
    btn.disabled = false;
  }
});
</script>

</body>
</html>
