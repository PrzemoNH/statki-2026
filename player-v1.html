<style>
* { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial; }

body { 
  min-height: 100vh; 
  background: radial-gradient(circle at top, #12213a, #070b14 60%); 
  color: #eaf2ff; 
  padding: 12px; 
  display: flex;
  flex-direction: column;
}

body::before, body::after { 
  content: ""; 
  position: fixed; 
  width: 400px; 
  height: 400px; 
  border-radius: 50%; 
  filter: blur(120px); 
  z-index: -1; 
  opacity: 0.25; 
}
body::before { background: #00ff99; top: -100px; left: -120px; }
body::after { background: #3b82f6; bottom: -120px; right: -120px; }

h1 { font-size: 1.4rem; letter-spacing: 1px; margin-bottom: 2px; color: #00ffb3; }
p { color: #9fb0c8; font-size: 0.9rem; margin-bottom: 0; }

/* JOIN SCREEN */
#joinScreen { max-width: 480px; margin: 0 auto; }
input { width: 100%; padding: 14px 16px; margin: 8px 0; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.12); color: #eaf2ff; font-size: 18px; border-radius: 12px; outline: none; }
input:focus { border-color: #00ffb3; background: rgba(0,255,179,0.05); box-shadow: 0 0 0 3px rgba(0,255,179,0.1); }
input::placeholder { color: #4a6080; }
button { border: none; cursor: pointer; border-radius: 12px; padding: 14px 20px; font-weight: 600; transition: 0.25s ease; }
#btnJoin { width: 100%; padding: 16px; margin-top: 14px; background: linear-gradient(135deg, #00ff99, #00c2ff); color: #06121f; font-size: 18px; font-weight: 700; }
#btnJoin:hover { transform: translateY(-2px); box-shadow: 0 15px 40px rgba(0,255,153,0.35); }
#btnJoin:disabled { background: #1a2233; color: #445; cursor: not-allowed; transform: none; box-shadow: none; border: 1px solid #2b3b55; }

#status { margin-top: 20px; padding: 14px 16px; border-radius: 12px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); min-height: 48px; font-size: 15px; }
.ok { color: #00ff99; } .err { color: #ff4d4d; } .inf { color: #ffd166; }

/* WAITING SCREEN */
#waitingScreen { display: none; text-align: center; margin-top: 40px; max-width: 480px; margin-left: auto; margin-right: auto; }
#waitingScreen h2 { color: #00ffb3; font-size: 1.6rem; margin-bottom: 12px; }
.pulse { display: inline-block; width: 16px; height: 16px; background: #00ffb3; border-radius: 50%; animation: pulse 1.4s infinite; margin: 0 4px; }
.pulse:nth-child(2) { animation-delay: 0.2s; }
.pulse:nth-child(3) { animation-delay: 0.4s; }
@keyframes pulse { 0%,80%,100% { transform: scale(0.6); opacity: 0.4; } 40% { transform: scale(1); opacity: 1; } }

/* GAME SCREEN */
#gameScreen { 
  display: none; 
  flex-direction: column;
  flex: 1;
  min-height: 0;
}

#turnBanner { 
  padding: 6px 12px; 
  border-radius: 8px; 
  text-align: center; 
  font-size: 0.85rem; 
  font-weight: 700; 
  margin-bottom: 8px; 
  background: rgba(255,255,255,0.05); 
  border: 1px solid rgba(255,255,255,0.08);
  flex-shrink: 0;
}
#turnBanner.my-turn { background: rgba(0,255,153,0.1); border-color: #00ff99; color: #00ff99; }
#turnBanner.waiting-turn { background: rgba(255,170,0,0.1); border-color: #ffaa00; color: #ffaa00; }

#shotResult { 
  min-height: 20px; 
  text-align: center; 
  font-size: 0.9rem; 
  font-weight: 700; 
  margin-bottom: 6px;
  flex-shrink: 0;
}

/* BOARDS GRID - FLEX LAYOUT */
#boardsGrid {
  display: flex;
  flex-direction: row;
  gap: 12px;
  flex: 1;
  min-height: 0;
  overflow: hidden;
  margin-bottom: 8px;
}

#boardsGrid.vertical {
  flex-direction: column;
}

.boardPanel {
  display: flex;
  flex-direction: column;
  gap: 4px;
  min-height: 0;
  flex: 1;
  overflow: hidden;
}

.boardHeader { 
  display: flex; 
  align-items: center; 
  gap: 6px; 
  flex-shrink: 0;
}

.colorDot { width: 14px; height: 14px; border-radius: 50%; }
.playerName { font-size: 0.8rem; color: #00ffb3; font-weight: 700; }
.boardInfo { color: #9fb0c8; font-size: 10px; }

/* BOARD WITH COORDINATES — całość scrolluje razem (litery, cyfry, mapa) */
.boardWrapper {
  min-height: 0;
  flex: 1;
  overflow: auto;
  -webkit-overflow-scrolling: touch;
}

.boardWithCoordinates {
  display: flex;
  gap: 0;
  width: fit-content;
}

.coordinatesY {
  display: flex;
  flex-direction: column;
  gap: 1px;
  font-size: 9px;
  color: #9fb0c8;
  font-weight: 600;
  flex-shrink: 0;
}

.coordinateY {
  width: 16px;
  height: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.boardColumn {
  display: flex;
  flex-direction: column;
  gap: 1px;
}

.coordinatesX {
  display: flex;
  gap: 1px;
  flex-shrink: 0;
}

.coordinateX {
  width: 16px;
  height: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 9px;
  color: #9fb0c8;
  font-weight: 600;
  flex-shrink: 0;
}

.miniBoard {
  background: #1a2a40;
  border: 1px solid #1a2a40;
  padding: 0;
  flex-shrink: 0;
}

.cell { 
  width: 16px; 
  height: 16px; 
  background: #0a1520; 
  transition: 0.15s; 
  cursor: default;
  border: 0.5px solid #1a2a40;
  flex-shrink: 0;
}

.cell.clickable { cursor: pointer; }
.cell.clickable:hover { background: rgba(0,255,179,0.15); }
.cell.ship { background: rgba(0,255,179,0.4); }
.cell.hit { background: rgba(255,77,77,0.7); }
.cell.miss { background: rgba(80,80,100,0.5); }

/* BUTTONS CONTAINER */
#controlsContainer {
  display: flex;
  gap: 8px;
  flex-shrink: 0;
}

#btnHide { 
  background: rgba(255,255,255,0.08); 
  color: #eaf2ff; 
  border: 1px solid rgba(255,255,255,0.15); 
  font-size: 11px; 
  padding: 8px 10px;
  flex: 1;
  border-radius: 8px;
}

#btnHide:hover { 
  background: rgba(255,255,255,0.14); 
  transform: none; 
  box-shadow: none; 
}

#orientationToggle {
  background: rgba(255,255,255,0.08); 
  color: #eaf2ff; 
  border: 1px solid rgba(255,255,255,0.15); 
  font-size: 18px;
  width: 40px;
  height: 40px;
  padding: 0;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

#orientationToggle:hover { 
  background: rgba(255,255,255,0.14); 
  transform: none; 
  box-shadow: none; 
}

/* GAME OVER */
#gameOver { 
  display: none; 
  text-align: center; 
  padding: 16px; 
  border-radius: 12px; 
  background: rgba(0,255,153,0.1); 
  border: 2px solid #00ff99; 
  margin-top: 8px; 
  flex-shrink: 0;
}
#gameOver h2 { color: #00ff99; font-size: 1.4rem; margin-bottom: 6px; }
#gameOver p { font-size: 0.85rem; }

/* RESPONSIVE */
@media (orientation: landscape) {
  body { padding: 8px; }
  h1 { font-size: 1.2rem; }
  #boardsGrid { gap: 8px; }
  .boardInfo { font-size: 9px; }
  .coordinateX { width: 14px; height: 14px; font-size: 8px; }
  .coordinateY { width: 14px; height: 14px; font-size: 8px; }
  .miniBoard { gap: 0.5px; }
  .cell { width: 14px; height: 14px; }
}

@media (orientation: portrait) {
  body { padding: 12px; }
}
</style>

<script type="module">
const { createClient } = await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm');
const supabase = createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);

const COLORS = ['#ff4444','#4488ff','#ffaa00','#aa44ff'];

let myPlayerId = null;
let myColor = null;
let roomCode = null;

let currentRoom = null;

let isShooting = false;

function generateDeviceId() {
  let id = localStorage.getItem('device_id');
  if (!id) { id = 'dev_' + Math.random().toString(36).substr(2, 12); localStorage.setItem('device_id', id); }
  return id;
}

function log(msg, type='inf') {
  const div = document.getElementById('status');
  div.innerHTML = `<p class="${type}">${msg}</p>`;
}

function isMyTurn() {
  return currentRoom?.current_turn === myPlayerId;
}

function updateTurnBanner() {
  const banner = document.getElementById('turnBanner');
  if (!currentRoom) return;
  if (currentRoom.status === 'finished') {
    banner.className = 'waiting-turn';
    banner.textContent = '🏁 Gra zakończona';
    return;
  }
  if (isMyTurn()) {
    banner.className = 'my-turn';
    banner.textContent = '🎯 TWOJA TURA — kliknij na mapę wroga!';
  } else {
    const currentPlayer = allPlayers.find(p => p.id === currentRoom.current_turn);
    banner.className = 'waiting-turn';
    banner.textContent = '⏳ Tura: ' + (currentPlayer?.name || '...');
  }
}

function getNextTurn() {
  if (!currentRoom?.turn_order) return null;
  const order = currentRoom.turn_order;
  const idx = order.indexOf(currentRoom.current_turn);
  return order[(idx + 1) % order.length];
}

async function shoot(targetPlayerId, row, col) {
  if (isShooting) return;
  if (!isMyTurn()) { showShotResult('⚠️ Nie twoja tura!', '#ffaa00'); return; }
  if (targetPlayerId === myPlayerId) { showShotResult('❌ Nie możesz strzelać do siebie!', '#ff4d4d'); return; }

  isShooting = true;

  const target = allPlayers.find(p => p.id === targetPlayerId);
  if (!target?.board) { isShooting = false; return; }

  const board = typeof target.board === 'string' ? JSON.parse(target.board) : target.board;
  const boardSize = Math.sqrt(board.length);
  const cell = board[row * boardSize + col];

  if (cell.hit) { showShotResult('❌ Już strzelałeś tu!', '#ffaa00'); isShooting = false; return; }

  board[row * boardSize + col].hit = true;
  const wasShip = cell.state === 'ship';
  let result = wasShip ? 'hit' : 'miss';

  if (wasShip) {
    const shipId = cell.shipId;
    const sunk = board.filter(c => c.shipId === shipId && !c.hit).length === 0;
    if (sunk) result = 'sunk';
  }

  const { error } = await supabase.from('players').update({ board: JSON.stringify(board) }).eq('id', targetPlayerId);

  if (error) { showShotResult('❌ Błąd zapisu!', '#ff4d4d'); isShooting = false; return; }

  if (result === 'sunk') showShotResult('⚓ ZATOPIONY!', '#00ff99');
  else if (result === 'hit') showShotResult('🎯 TRAFIENIE!', '#00ff99');
  else showShotResult('💧 PUDŁO!', '#4488ff');

  const totalShips = board.filter(c => c.state === 'ship').length;
  const hitShips = board.filter(c => c.state === 'ship' && c.hit).length;

  if (hitShips === totalShips) {
    await supabase.from('rooms').update({ status: 'finished' }).eq('code', roomCode);
    showGameOver(true, target.name);
    isShooting = false;
    return;
  }

  const nextTurn = getNextTurn();
  await supabase.from('rooms').update({ current_turn: nextTurn }).eq('code', roomCode);

  isShooting = false;
}

function showShotResult(msg, color) {
  const el = document.getElementById('shotResult');
  el.textContent = msg;
  el.style.color = color;
  setTimeout(() => { el.textContent = ''; }, 3000);
}

function showGameOver(iWon, enemyName) {
  document.getElementById('gameOver').style.display = 'block';
  document.getElementById('gameOverTitle').textContent = iWon ? '🏆 WYGRAŁEŚ!' : '💀 Przegrałeś';
  document.getElementById('gameOverMsg').textContent = iWon ? 'Zatopiłeś wszystkie statki ' + enemyName + '!' : enemyName + ' zatopił wszystkie twoje statki!';
}

/**
 * Renderuje planszę i podpina kliknięcia przez addEventListener
 * (data-atrybuty zamiast serializacji funkcji do onclick).
 */
function renderBoard(board, boardSize, isMyBoard, targetPlayerId, containerId) {
  const container = document.getElementById(containerId);
  container.innerHTML = BOARD.renderBoardHTML(board, boardSize, isMyBoard, targetPlayerId, isMyBoard ? null : shoot);

  if (!isMyBoard) {
    container.querySelectorAll('.cell.clickable').forEach(cell => {
      cell.addEventListener('click', () => {
        const row = parseInt(cell.dataset.row);
        const col = parseInt(cell.dataset.col);
        const target = cell.dataset.target;
        shoot(target, row, col);
      });
    });
  }
}

function updateGameDisplay(players) {
  if (players.length < 2) return;

  const myPlayer = players.find(p => p.id === myPlayerId);
  const enemy = players.find(p => p.id !== myPlayerId);

  if (myPlayer?.board) {
    const myBoardData = typeof myPlayer.board === 'string' ? JSON.parse(myPlayer.board) : myPlayer.board;
    const myBoardSize = Math.sqrt(myBoardData.length);
    
    document.getElementById('myColorDot').style.backgroundColor = myPlayer.color;
    document.getElementById('myPlayerName').textContent = myPlayer.name + ' (Ty)';
    document.getElementById('myBoardInfo').textContent = `${myBoardSize}×${myBoardSize} | Statki: ${myPlayer.ships ? (typeof myPlayer.ships === 'string' ? JSON.parse(myPlayer.ships) : myPlayer.ships).length : 0}`;
    
    renderBoard(myBoardData, myBoardSize, true, myPlayerId, 'myBoardContainer');
  }

  if (enemy?.board) {
    const enemyBoardData = typeof enemy.board === 'string' ? JSON.parse(enemy.board) : enemy.board;
    const enemyBoardSize = Math.sqrt(enemyBoardData.length);
    
    document.getElementById('enemyColorDot').style.backgroundColor = enemy.color;
    document.getElementById('enemyPlayerName').textContent = enemy.name;
    document.getElementById('enemyBoardInfo').textContent = `${enemyBoardSize}×${enemyBoardSize} | Statki: ${enemy.ships ? (typeof enemy.ships === 'string' ? JSON.parse(enemy.ships) : enemy.ships).length : 0}`;
    
    renderBoard(enemyBoardData, enemyBoardSize, false, enemy.id, 'enemyBoardContainer');
  }
}
