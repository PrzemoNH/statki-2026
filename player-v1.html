<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Statki 2026 — Gracz v2</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial; }

body { 
  min-height: 100vh; 
  background: radial-gradient(circle at top, #12213a, #070b14 60%); 
  color: #eaf2ff; 
  padding: 12px; 
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

body::before, body::after { 
  content: ""; 
  position: fixed; 
  width: 400px; 
  height: 400px; 
  border-radius: 50%; 
  filter: blur(120px); 
  z-index: -1; 
  opacity: 0.25; 
}
body::before { background: #00ff99; top: -100px; left: -120px; }
body::after { background: #3b82f6; bottom: -120px; right: -120px; }

h1 { font-size: 1.4rem; letter-spacing: 1px; margin-bottom: 2px; color: #00ffb3; }
p { color: #9fb0c8; font-size: 0.9rem; margin-bottom: 0; }

/* JOIN SCREEN */
#joinScreen { max-width: 480px; margin: 0 auto; }
input { width: 100%; padding: 14px 16px; margin: 8px 0; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.12); color: #eaf2ff; font-size: 18px; border-radius: 12px; outline: none; }
input:focus { border-color: #00ffb3; background: rgba(0,255,179,0.05); box-shadow: 0 0 0 3px rgba(0,255,179,0.1); }
input::placeholder { color: #4a6080; }
button { border: none; cursor: pointer; border-radius: 12px; padding: 14px 20px; font-weight: 600; transition: 0.25s ease; }
#btnJoin { width: 100%; padding: 16px; margin-top: 14px; background: linear-gradient(135deg, #00ff99, #00c2ff); color: #06121f; font-size: 18px; font-weight: 700; }
#btnJoin:hover { transform: translateY(-2px); box-shadow: 0 15px 40px rgba(0,255,153,0.35); }
#btnJoin:disabled { background: #1a2233; color: #445; cursor: not-allowed; transform: none; box-shadow: none; border: 1px solid #2b3b55; }

#status { margin-top: 20px; padding: 14px 16px; border-radius: 12px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); min-height: 48px; font-size: 15px; }
.ok { color: #00ff99; } .err { color: #ff4d4d; } .inf { color: #ffd166; }

/* WAITING SCREEN */
#waitingScreen { display: none; text-align: center; margin-top: 40px; max-width: 480px; margin-left: auto; margin-right: auto; }
#waitingScreen h2 { color: #00ffb3; font-size: 1.6rem; margin-bottom: 12px; }
.pulse { display: inline-block; width: 16px; height: 16px; background: #00ffb3; border-radius: 50%; animation: pulse 1.4s infinite; margin: 0 4px; }
.pulse:nth-child(2) { animation-delay: 0.2s; }
.pulse:nth-child(3) { animation-delay: 0.4s; }
@keyframes pulse { 0%,80%,100% { transform: scale(0.6); opacity: 0.4; } 40% { transform: scale(1); opacity: 1; } }

/* GAME SCREEN */
#gameScreen { 
  display: none; 
  flex-direction: column;
  flex: 1;
  min-height: 0;
}

#turnBanner { 
  padding: 6px 12px; 
  border-radius: 8px; 
  text-align: center; 
  font-size: 0.85rem; 
  font-weight: 700; 
  margin-bottom: 8px; 
  background: rgba(255,255,255,0.05); 
  border: 1px solid rgba(255,255,255,0.08);
  flex-shrink: 0;
}
#turnBanner.my-turn { background: rgba(0,255,153,0.1); border-color: #00ff99; color: #00ff99; }
#turnBanner.waiting-turn { background: rgba(255,170,0,0.1); border-color: #ffaa00; color: #ffaa00; }

#shotResult { 
  min-height: 20px; 
  text-align: center; 
  font-size: 0.9rem; 
  font-weight: 700; 
  margin-bottom: 6px;
  flex-shrink: 0;
}

/* BOARDS GRID - FLEX LAYOUT */
#boardsGrid {
  display: flex;
  flex-direction: row;
  gap: 12px;
  flex: 1;
  min-height: 0;
  overflow: hidden;
  margin-bottom: 8px;
}

#boardsGrid.vertical {
  flex-direction: column;
}

.boardPanel {
  display: flex;
  flex-direction: column;
  gap: 4px;
  min-height: 0;
  flex: 1;
  overflow: hidden;
}

.boardHeader { 
  display: flex; 
  align-items: center; 
  gap: 6px; 
  flex-shrink: 0;
}

.colorDot { width: 14px; height: 14px; border-radius: 50%; }
.playerName { font-size: 0.8rem; color: #00ffb3; font-weight: 700; }
.boardInfo { color: #9fb0c8; font-size: 10px; }

/* BOARD WITH COORDINATES */
.boardWrapper {
  display: flex;
  gap: 4px;
  align-items: flex-start;
  justify-content: center;
  min-height: 0;
  flex: 1;
  overflow: hidden;
}

.coordinatesY {
  display: flex;
  flex-direction: column;
  gap: 1px;
  font-size: 8px;
  color: #9fb0c8;
  font-weight: 600;
  flex-shrink: 0;
}

.coordinateY {
  width: 14px;
  height: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.boardWithCoordinates {
  display: flex;
  flex-direction: column;
  gap: 2px;
  min-height: 0;
  flex: 1;
  overflow: hidden;
}

.coordinatesX {
  display: flex;
  gap: 1px;
  justify-content: center;
  flex-shrink: 0;
}

.coordinateX {
  width: 14px;
  height: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 8px;
  color: #9fb0c8;
  font-weight: 600;
}

#boardGrid, #enemyBoardGrid { 
  display: inline-grid; 
  gap: 1px; 
  background: #1a2a40; 
  border: 1px solid #1a2a40;
  padding: 0;
  overflow: auto;
}

.cell { 
  width: 18px; 
  height: 18px; 
  background: #0a1520; 
  transition: 0.15s; 
  cursor: default;
  border: 0.5px solid #1a2a40;
  flex-shrink: 0;
}

.cell.clickable { cursor: pointer; }
.cell.clickable:hover { background: rgba(0,255,179,0.15); }
.cell.ship { background: rgba(0,255,179,0.4); }
.cell.hit { background: rgba(255,77,77,0.7); }
.cell.miss { background: rgba(80,80,100,0.5); }

/* BUTTONS CONTAINER */
#controlsContainer {
  display: flex;
  gap: 8px;
  flex-shrink: 0;
}

#btnHide, #orientationToggle { 
  background: rgba(255,255,255,0.08); 
  color: #eaf2ff; 
  border: 1px solid rgba(255,255,255,0.15); 
  font-size: 11px; 
  padding: 8px 10px;
  flex: 1;
  border-radius: 8px;
}

#btnHide:hover, #orientationToggle:hover { 
  background: rgba(255,255,255,0.14); 
  transform: none; 
  box-shadow: none; 
}

/* GAME OVER */
#gameOver { 
  display: none; 
  text-align: center; 
  padding: 16px; 
  border-radius: 12px; 
  background: rgba(0,255,153,0.1); 
  border: 2px solid #00ff99; 
  margin-top: 8px; 
  flex-shrink: 0;
}
#gameOver h2 { color: #00ff99; font-size: 1.4rem; margin-bottom: 6px; }
#gameOver p { font-size: 0.85rem; }
</style>
</head>
<body>

<h1>⚓ Statki 2026</h1>
<p>Gracz — v0.4.1</p>

<div id="joinScreen">
  <input id="inputCode" type="text" placeholder="Kod pokoju (np. ABC12)" maxlength="5" autocomplete="off" autocapitalize="characters">
  <input id="inputName" type="text" placeholder="Twój nick" maxlength="16" autocomplete="off">
  <button id="btnJoin">DOŁĄCZ</button>
  <div id="status"></div>
</div>

<div id="waitingScreen">
  <h2>Czekam na start gry</h2>
  <p style="color:#9fb0c8; margin-bottom:24px">Host zaraz rozpocznie rozgrywkę</p>
  <div>
    <span class="pulse"></span>
    <span class="pulse"></span>
    <span class="pulse"></span>
  </div>
  <p id="waitingName" style="margin-top:24px; color:#00ffb3; font-size:1.1rem"></p>
</div>

<div id="gameScreen">
  <div id="turnBanner">⏳ Ładowanie...</div>
  <div id="shotResult"></div>

  <div id="boardsGrid">
    <!-- MOJA MAPA -->
    <div class="boardPanel">
      <div class="boardHeader">
        <div class="colorDot" id="myColorDot"></div>
        <span class="playerName" id="myPlayerName">Moja mapa</span>
      </div>
      <div class="boardInfo" id="myBoardInfo"></div>
      <div class="boardWrapper">
        <div class="coordinatesY" id="coordinatesY"></div>
        <div class="boardWithCoordinates">
          <div class="coordinatesX" id="coordinatesX"></div>
          <div id="boardGrid"></div>
        </div>
      </div>
    </div>

    <!-- MAPA WROGA -->
    <div class="boardPanel">
      <div class="boardHeader">
        <div class="colorDot" id="enemyColorDot"></div>
        <span class="playerName" id="enemyPlayerName">Wróg</span>
      </div>
      <div class="boardInfo" id="enemyBoardInfo"></div>
      <div class="boardWrapper">
        <div class="coordinatesY" id="enemyCoordinatesY"></div>
        <div class="boardWithCoordinates">
          <div class="coordinatesX" id="enemyCoordinatesX"></div>
          <div id="enemyBoardGrid"></div>
        </div>
      </div>
    </div>
  </div>

  <div id="controlsContainer">
    <button id="btnHide">👁 Ukryj</button>
    <button id="orientationToggle">🔄</button>
  </div>
</div>

<div id="gameOver">
  <h2 id="gameOverTitle">🏆 Koniec gry!</h2>
  <p id="gameOverMsg"></p>
</div>

<script>
const CONFIG = {
  SUPABASE_URL: 'https://bmnffrnwnyrqefrzrhtf.supabase.co',
  SUPABASE_ANON_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJtbmZmcm53bnlycWVmcnpyaHRmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI1NTk2MDIsImV4cCI6MjA5ODEzNTYwMn0.irhBO6JX3PNXvJJFFEPcUEayzw-_cEJeBn9OsTcrGIE'
};
</script>

<script type="module">
const { createClient } = await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm');
const supabase = createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);

const COLORS = ['#ff4444','#4488ff','#ffaa00','#aa44ff'];
const COORD_LETTERS = ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H', 'I', 'J', 'K', 'L', 'M', 'N', 'O'];

let myPlayerId = null;
let myColor = null;
let roomCode = null;
let allPlayers = [];
let currentRoom = null;
let myBoardSize = 10;
let boardHidden = false;
let isShooting = false;
let isVertical = false;

const urlParams = new URLSearchParams(window.location.search);
const codeFromUrl = urlParams.get('code');
if (codeFromUrl) document.getElementById('inputCode').value = codeFromUrl.toUpperCase();

function generateDeviceId() {
  let id = localStorage.getItem('device_id');
  if (!id) { id = 'dev_' + Math.random().toString(36).substr(2, 12); localStorage.setItem('device_id', id); }
  return id;
}

function log(msg, type='inf') {
  const div = document.getElementById('status');
  div.innerHTML = `<p class="${type}">${msg}</p>`;
}

function isMyTurn() {
  return currentRoom?.current_turn === myPlayerId;
}

function updateTurnBanner() {
  const banner = document.getElementById('turnBanner');
  if (!currentRoom) return;
  if (currentRoom.status === 'finished') {
    banner.className = 'waiting-turn';
    banner.textContent = '🏁 Gra zakończona';
    return;
  }
  if (isMyTurn()) {
    banner.className = 'my-turn';
    banner.textContent = '🎯 TWOJA TURA — kliknij na mapę wroga!';
  } else {
    const currentPlayer = allPlayers.find(p => p.id === currentRoom.current_turn);
    banner.className = 'waiting-turn';
    banner.textContent = '⏳ Tura: ' + (currentPlayer?.name || '...');
  }
}

function getNextTurn() {
  if (!currentRoom?.turn_order) return null;
  const order = currentRoom.turn_order;
  const idx = order.indexOf(currentRoom.current_turn);
  return order[(idx + 1) % order.length];
}

async function shoot(targetPlayerId, row, col) {
  if (isShooting) return;
  if (!isMyTurn()) { showShotResult('⚠️ Nie twoja tura!', '#ffaa00'); return; }
  if (targetPlayerId === myPlayerId) { showShotResult('❌ Nie możesz strzelać do siebie!', '#ff4d4d'); return; }

  isShooting = true;

  const target = allPlayers.find(p => p.id === targetPlayerId);
  if (!target?.board) { isShooting = false; return; }

  const board = typeof target.board === 'string' ? JSON.parse(target.board) : target.board;
  const boardSize = Math.sqrt(board.length);
  const cell = board[row * boardSize + col];

  if (cell.hit) { showShotResult('❌ Już strzelałeś tu!', '#ffaa00'); isShooting = false; return; }

  board[row * boardSize + col].hit = true;
  const wasShip = cell.state === 'ship';
  let result = wasShip ? 'hit' : 'miss';

  if (wasShip) {
    const shipId = cell.shipId;
    const sunk = board.filter(c => c.shipId === shipId && !c.hit).length === 0;
    if (sunk) result = 'sunk';
  }

  const { error } = await supabase.from('players').update({ board: JSON.stringify(board) }).eq('id', targetPlayerId);

  if (error) { showShotResult('❌ Błąd zapisu!', '#ff4d4d'); isShooting = false; return; }

  if (result === 'sunk') showShotResult('⚓ ZATOPIONY!', '#00ff99');
  else if (result === 'hit') showShotResult('🎯 TRAFIENIE!', '#00ff99');
  else showShotResult('💧 PUDŁO!', '#4488ff');

  const totalShips = board.filter(c => c.state === 'ship').length;
  const hitShips = board.filter(c => c.state === 'ship' && c.hit).length;

  if (hitShips === totalShips) {
    await supabase.from('rooms').update({ status: 'finished' }).eq('code', roomCode);
    showGameOver(true, target.name);
    isShooting = false;
    return;
  }

  const nextTurn = getNextTurn();
  await supabase.from('rooms').update({ current_turn: nextTurn }).eq('code', roomCode);

  isShooting = false;
}

function showShotResult(msg, color) {
  const el = document.getElementById('shotResult');
  el.textContent = msg;
  el.style.color = color;
  setTimeout(() => { el.textContent = ''; }, 3000);
}

function showGameOver(iWon, enemyName) {
  document.getElementById('gameOver').style.display = 'block';
  document.getElementById('gameOverTitle').textContent = iWon ? '🏆 WYGRAŁEŚ!' : '💀 Przegrałeś';
  document.getElementById('gameOverMsg').textContent = iWon ? 'Zatopiłeś wszystkie statki ' + enemyName + '!' : enemyName + ' zatopił wszystkie twoje statki!';
}

function renderCoordinates(boardSize, isEnemy = false) {
  const yPrefix = isEnemy ? '#enemyCoordinatesY' : '#coordinatesY';
  const xPrefix = isEnemy ? '#enemyCoordinatesX' : '#coordinatesX';
  
  const yDiv = document.querySelector(yPrefix);
  const xDiv = document.querySelector(xPrefix);
  
  yDiv.innerHTML = '';
  xDiv.innerHTML = '';
  
  for (let i = 0; i < boardSize; i++) {
    const yCoord = document.createElement('div');
    yCoord.className = 'coordinateY';
    yCoord.textContent = (i + 1);
    yDiv.appendChild(yCoord);
    
    const xCoord = document.createElement('div');
    xCoord.className = 'coordinateX';
    xCoord.textContent = COORD_LETTERS[i];
    xDiv.appendChild(xCoord);
  }
}

function renderBoard(board, boardSize, isMyBoard, targetPlayerId, isEnemy = false) {
  const gridId = isEnemy ? '#enemyBoardGrid' : '#boardGrid';
  const grid = document.querySelector(gridId);
  grid.style.gridTemplateColumns = `repeat(${boardSize}, 18px)`;
  grid.innerHTML = '';

  for (let i = 0; i < board.length; i++) {
    const cell = board[i];
    const row = Math.floor(i / boardSize);
    const col = i % boardSize;
    const cellDiv = document.createElement('div');
    cellDiv.className = 'cell';

    if (isMyBoard) {
      if (cell.state === 'ship') cellDiv.classList.add('ship');
      if (cell.hit && cell.state === 'ship') cellDiv.classList.add('hit');
      if (cell.hit && cell.state === 'water') cellDiv.classList.add('miss');
    } else {
      if (cell.hit && cell.state === 'ship') cellDiv.classList.add('hit');
      else if (cell.hit && cell.state === 'water') cellDiv.classList.add('miss');
      else if (!cell.hit && isMyTurn()) {
        cellDiv.classList.add('clickable');
        cellDiv.onclick = () => shoot(targetPlayerId, row, col);
      }
    }

    grid.appendChild(cellDiv);
  }
  
  renderCoordinates(boardSize, isEnemy);
}

function updateGameDisplay(players) {
  if (players.length < 2) return;

  const myPlayer = players.find(p => p.id === myPlayerId);
  const enemy = players.find(p => p.id !== myPlayerId);

  if (myPlayer?.board) {
    const myBoardData = typeof myPlayer.board === 'string' ? JSON.parse(myPlayer.board) : myPlayer.board;
    const myBoardSize = Math.sqrt(myBoardData.length);
    
    document.getElementById('myColorDot').style.backgroundColor = myPlayer.color;
    document.getElementById('myPlayerName').textContent = myPlayer.name + ' (Ty)';
    document.getElementById('myBoardInfo').textContent = `${myBoardSize}×${myBoardSize} | Statki: ${myPlayer.ships ? (typeof myPlayer.ships === 'string' ? JSON.parse(myPlayer.ships) : myPlayer.ships).length : 0}`;
    
    renderBoard(myBoardData, myBoardSize, true, myPlayerId, false);
  }

  if (enemy?.board) {
    const enemyBoardData = typeof enemy.board === 'string' ? JSON.parse(enemy.board) : enemy.board;
    const enemyBoardSize = Math.sqrt(enemyBoardData.length);
    
    document.getElementById('enemyColorDot').style.backgroundColor = enemy.color;
    document.getElementById('enemyPlayerName').textContent = enemy.name;
    document.getElementById('enemyBoardInfo').textContent = `${enemyBoardSize}×${enemyBoardSize} | Statki: ${enemy.ships ? (typeof enemy.ships === 'string' ? JSON.parse(enemy.ships) : enemy.ships).length : 0}`;
    
    renderBoard(enemyBoardData, enemyBoardSize, false, enemy.id, true);
  }
}

function startPolling() {
  setInterval(async () => {
    if (!roomCode) return;

    const { data: players } = await supabase.from('players').select('*').eq('room_code', roomCode);
    const { data: room } = await supabase.from('rooms').select('*').eq('code', roomCode).single();

    if (players) allPlayers = players;
    if (room) currentRoom = room;

    updateTurnBanner();
    updateGameDisplay(players || []);

    if (room?.status === 'finished') {
      const myBoard = players?.find(p => p.id === myPlayerId)?.board;
      if (myBoard) {
        const board = typeof myBoard === 'string' ? JSON.parse(myBoard) : myBoard;
        const allHit = board.filter(c => c.state === 'ship').every(c => c.hit);
        if (allHit) showGameOver(false, 'przeciwnik');
      }
    }
  }, 2000);
}

function showGame() {
  document.getElementById('joinScreen').style.display = 'none';
  document.getElementById('waitingScreen').style.display = 'none';
  document.getElementById('gameScreen').style.display = 'flex';
  startPolling();
}

document.getElementById('btnHide').onclick = () => {
  boardHidden = !boardHidden;
  document.getElementById('boardGrid').style.opacity = boardHidden ? '0' : '1';
  document.getElementById('btnHide').textContent = boardHidden ? '👁 Pokaż' : '👁 Ukryj';
};

document.getElementById('orientationToggle').onclick = () => {
  const grid = document.getElementById('boardsGrid');
  isVertical = !isVertical;
  if (isVertical) {
    grid.classList.add('vertical');
  } else {
    grid.classList.remove('vertical');
  }
};

document.getElementById('btnJoin').addEventListener('click', async () => {
  const code = document.getElementById('inputCode').value.trim().toUpperCase();
  const name = document.getElementById('inputName').value.trim();
  const btn = document.getElementById('btnJoin');

  if (!code || code.length !== 5) return log('❌ Wpisz poprawny kod pokoju (5 znaków)', 'err');
  if (!name || name.length < 2) return log('❌ Nick musi mieć min. 2 znaki', 'err');

  btn.disabled = true;
  log('⏳ Łączenie...', 'inf');

  try {
    const { data: room, error: roomErr } = await supabase.from('rooms').select('*').eq('code', code).single();
    if (roomErr || !room) throw new Error('Nie znaleziono pokoju: ' + code);

    roomCode = room.code;
    currentRoom = room;

    const deviceId = generateDeviceId();
    const { data: existing } = await supabase.from('players').select('*').eq('room_code', code).eq('device_id', deviceId).single();

    let player;
    if (existing) {
      player = existing;
    } else {
      if (room.status !== 'waiting') throw new Error('Gra już się rozpoczęła');
      const { data: currentPlayers } = await supabase.from('players').select('*').eq('room_code', code);
      if (currentPlayers && currentPlayers.length >= 4) throw new Error('Pokój jest pełny (max 4 graczy)');
      const color = COLORS[currentPlayers ? currentPlayers.length % COLORS.length : 0];
      const { data: newPlayer, error: playerErr } = await supabase.from('players').insert({ room_code: code, device_id: deviceId, name, color, status: 'waiting', is_host: false }).select().single();
      if (playerErr) throw playerErr;
      player = newPlayer;
    }

    myPlayerId = player.id;
    myColor = player.color;
    document.getElementById('joinScreen').style.display = 'none';

    if (room.status === 'playing' || room.status === 'finished') {
      showGame();
    } else {
      document.getElementById('waitingScreen').style.display = 'block';
      document.getElementById('waitingName').textContent = '👤 ' + player.name;
      const checkStart = setInterval(async () => {
        const { data: updated } = await supabase.from('rooms').select('*').eq('code', code).single();
        if (updated?.status === 'playing') {
          clearInterval(checkStart);
          currentRoom = updated;
          showGame();
        }
      }, 1000);
    }
  } catch (err) {
    log('❌ ' + err.message, 'err');
    btn.disabled = false;
  }
});
</script>

</body>
</html>
